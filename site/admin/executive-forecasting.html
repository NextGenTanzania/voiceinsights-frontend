<!doctype html><html lang="en"><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Executive Forecasting — VoiceInsights Africa</title><style>:root{--bg:#071611;--card:#10241d;--line:#27463a;--gold:#d6b45a;--text:#f5f7f6;--muted:#a9bbb4}*{box-sizing:border-box}body{margin:0;background:linear-gradient(140deg,#06110d,#0d251c);color:var(--text);font-family:Inter,Arial,sans-serif}header{padding:28px 6%;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:16px;align-items:center}main{padding:32px 6%;max-width:1500px;margin:auto}.eyebrow{color:var(--gold);font-weight:800;text-transform:uppercase;letter-spacing:.12em;font-size:.75rem}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px}.card{background:rgba(16,36,29,.92);border:1px solid var(--line);border-radius:18px;padding:20px}.metric strong{font-size:2rem;display:block;color:var(--gold)}table{width:100%;border-collapse:collapse}th,td{padding:12px;border-bottom:1px solid var(--line);text-align:left}.btn{display:inline-block;background:var(--gold);color:#122017;border:0;border-radius:10px;padding:10px 14px;font-weight:800;text-decoration:none;cursor:pointer}input,textarea{width:100%;background:#091a14;color:white;border:1px solid var(--line);border-radius:10px;padding:12px}.muted{color:var(--muted)}@media(max-width:900px){.grid{grid-template-columns:1fr 1fr}}@media(max-width:600px){.grid{grid-template-columns:1fr}header{align-items:flex-start;flex-direction:column}main{padding:22px 4%}}</style></head><body>
<a class="skip-link" href="#main-content">Skip to main content</a><header><div><div class='eyebrow'>Enterprise Customer Success</div><h1>Executive Forecasting</h1><div class='muted'>Weighted renewal, expansion and confidence forecast.</div></div><a class='btn' href='/admin/customer-success-dashboard.html'>Unified Dashboard</a></header><main id="main-content"><div class='card'><button type="button" class='btn' id='run'>Run Forecast</button><div id='result' class='grid' style='margin-top:18px'></div></div></main><script src='/assets/js/config.js'></script><script>const api=window.VI_API_BASE||'https://voiceinsights-api.kitentyatsnp.workers.dev';const headers=()=>{const t=localStorage.getItem('vi_token');return t?{Authorization:'Bearer '+t}:{}};</script><script>run.onclick=async()=>{const r=await fetch(api+'/api/customer-success/v2109c/forecast',{method:'POST',headers:{...headers(),'Content-Type':'application/json'},body:JSON.stringify({renewals:[],expansion:[],currency:'USD'})});const d=await r.json();result.innerHTML=Object.entries(d.forecast||{}).filter(x=>typeof x[1]!=='object').map(([k,v])=>`<div class='card metric'><strong>${v}</strong><span>${k.replaceAll('_',' ')}</span></div>`).join('')}</script></body></html>
