<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Respondents — VoiceInsights Africa</title>
<link rel="stylesheet" href="/assets/css/style.css">
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div class="shell">
  <div id="sidebar-mount"></div>
  <main class="main">
    <div id="topbar-mount"></div>
    <div class="content">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Phone</th><th>Region</th><th>Gender</th><th>Age Band</th><th>Consent</th><th>Responses</th><th>First Seen</th></tr></thead>
          <tbody id="resp-tbody">
            <tr><td colspan="7" class="muted-note" style="padding:1.5rem;">Loading respondents…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>
<script src="/assets/js/config.js"></script>
<script src="/assets/js/i18n.js"></script>
<script src="/assets/js/app.js"></script>
<script>
  if (!requireLogin()) { /* redirected */ }
  renderShell({ role:'client', active:'/app/respondents.html', eyebrow:'Participants', title:'Respondents' });

  (async () => {
    const tbody = document.getElementById('resp-tbody');
    try {
      const { respondents } = await apiRequest('/api/respondents');
      if (!respondents.length) {
        tbody.innerHTML = `<tr><td colspan="7" class="muted-note" style="padding:1.5rem;">No respondents yet — they'll appear here as soon as someone answers a survey on any channel.</td></tr>`;
        return;
      }
      tbody.innerHTML = respondents.map(r => `
        <tr>
          <td>${r.phone_number || '<span class="muted-note">Anonymous (web)</span>'}</td>
          <td>${r.region || '—'}</td>
          <td>${r.gender || '—'}</td>
          <td>${r.age_bracket || '—'}</td>
          <td>${r.consent_given ? '<span class="badge badge-success">Given</span>' : '<span class="badge badge-neutral">—</span>'}</td>
          <td>${r.response_count}</td>
          <td>${new Date(r.created_at + 'Z').toLocaleDateString()}</td>
        </tr>`).join('');
    } catch (e) {
      tbody.innerHTML = `<tr><td colspan="7" class="muted-note" style="padding:1.5rem; color:var(--danger);">Could not load: ${e.message}</td></tr>`;
    }
  })();
</script>
</body>
</html>
