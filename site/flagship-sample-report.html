<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Flagship Sample Report | VoiceInsights Africa</title><link rel="stylesheet" href="/assets/css/style.css"><style>body{background:#07100d;color:#eef6f2}.wrap{max-width:1120px;margin:auto;padding:24px}.cover{border-radius:26px;padding:50px;min-height:360px;display:flex;flex-direction:column;justify-content:flex-end}.cover h1{font-size:clamp(2.2rem,6vw,4.8rem);line-height:1;margin:0 0 15px}.grid{display:grid;grid-template-columns:2fr 1fr;gap:24px}.panel{background:#0e1916;border:1px solid #244038;border-radius:18px;padding:24px;margin:20px 0}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.kpi{background:#14241f;padding:15px;border-radius:12px}.finding{border-left:4px solid #d4af37;padding:12px 16px;margin:12px 0;background:#101f1b}.actions{display:flex;gap:8px;flex-wrap:wrap}.actions a{background:#d4af37;color:#111;padding:10px 14px;border-radius:10px;text-decoration:none;font-weight:800}@media(max-width:760px){.grid{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}.cover{padding:26px}}</style></head><body><div class="wrap"><p><a href="/sample-reports.html" style="color:#d4af37">← Report Library</a></p><div id="app">Loading…</div></div><script src="/assets/js/config.js"></script><script>
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
async function load(){const key=new URLSearchParams(location.search).get('key');try{const r=await fetch(`${API_BASE_URL}/api/public/flagship-sample-library/${encodeURIComponent(key)}`);if(!r.ok)throw new Error('Report not found');const d=await r.json(),x=d.sample,m=d.report,c=x.cover;document.title=x.title+' | VoiceInsights Africa';document.querySelector('#app').innerHTML=`<section class="cover" style="background:linear-gradient(135deg,${c.primary},${c.accent})"><small>TIER ${x.tier} · ${esc(x.category)} · SYNTHETIC DEMONSTRATION</small><h1>${esc(x.title)}</h1><p>${esc(x.promise)}</p></section><div class="actions" style="margin:18px 0">${['pdf','pptx','docx','xlsx'].map(f=>`<a href="${API_BASE_URL}/api/public/flagship-sample-library/${x.key}/export/${f}">Download ${f.toUpperCase()}</a>`).join('')}</div><section class="panel"><h2>Executive Intelligence</h2><p>${esc(m.executive_summary)}</p><div class="kpis">${m.kpis.map(k=>`<div class="kpi"><strong>${esc(k.value)}</strong><br><small>${esc(k.label)}</small></div>`).join('')}</div></section><div class="grid"><main><section class="panel"><h2>Critical Findings</h2>${m.findings.map(f=>`<div class="finding"><strong>${esc(f.id)}</strong><p>${esc(f.text)}</p><small>Evidence: ${esc(f.evidence_ids.join(', '))} · Confidence ${f.confidence_score}%</small></div>`).join('')}</section><section class="panel"><h2>Decisions & Recommendations</h2>${m.recommendations.map(r=>`<div class="finding"><strong>${esc(r.priority)} · ${esc(r.owner)}</strong><p>${esc(r.recommendation)}</p><small>${esc(r.timeline)}</small></div>`).join('')}</section></main><aside><section class="panel"><h2>Publication Profile</h2><p>${esc(x.style)}</p><h3>Standards</h3><ul>${x.standards.map(s=>`<li>${esc(s)}</li>`).join('')}</ul><h3>Visual System</h3><ul>${x.visuals.map(s=>`<li>${esc(s)}</li>`).join('')}</ul></section><section class="panel"><h2>Methodology</h2>${Object.entries(m.methodology).map(([k,v])=>`<p><strong>${esc(k.replaceAll('_',' '))}</strong><br>${esc(Array.isArray(v)?v.join(', '):v)}</p>`).join('')}</section></aside></div><section class="panel"><h2>Evidence Explorer</h2>${m.evidence.map(e=>`<div class="finding"><strong>${esc(e.id)} · ${esc(e.type)}</strong><p>${esc(e.source)}</p><small>${esc(e.verification)} · confidence ${e.confidence_score}%</small></div>`).join('')}</section><section class="panel"><strong>Integrity notice</strong><p>${esc(d.integrity_notice)}</p></section>`}catch(e){document.querySelector('#app').innerHTML=`<div class="panel">${esc(e.message)}</div>`}}
load();
</script></body></html>
