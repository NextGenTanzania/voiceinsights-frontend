<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/assets/img/logo-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leads — Admin Console</title>
<link rel="stylesheet" href="/assets/css/style.css">
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div class="shell">
  <div id="sidebar-mount"></div>
  <main class="main">
    <div id="topbar-mount"></div>
    <div class="content">
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th data-i18n="lead.th_name">Name</th><th data-i18n="lead.th_email">Email</th><th data-i18n="lead.th_org">Organization</th>
            <th data-i18n="lead.th_type">Type</th><th data-i18n="lead.th_country">Country</th><th data-i18n="lead.th_channels">Channels</th><th data-i18n="lead.th_submitted">Submitted</th>
          </tr></thead>
          <tbody id="leads-tbody">
            <tr><td colspan="7" class="muted-note" style="padding:1.5rem;" id="lead-loading">Loading leads…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>
<script src="/assets/js/config.js"></script>
<script src="/assets/js/i18n.js"></script>
<script src="/assets/js/app.js"></script>
<script>
  if (!requireLogin()) { /* redirected */ }
  const storedUserCheck = JSON.parse(localStorage.getItem('vi_user') || 'null');
  if (storedUserCheck?.role !== 'super_admin') {
    document.body.innerHTML = '<div style="display:flex; align-items:center; justify-content:center; height:100vh; text-align:center; padding:2rem;"><div><h2>Super Admin access required</h2><p class="muted-note">You do not have permission to view this page.</p><a href="/app/dashboard.html" class="btn btn-primary" style="margin-top:1rem;">Go to Dashboard</a></div></div>';
    throw new Error('Access denied — not a Super Admin');
  }
  renderShell({ role:'admin', active:'/admin/leads.html', eyebrow:'Sales Pipeline', title:'Website Leads' });
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.getAttribute('data-i18n'), el.textContent); });
  document.getElementById('lead-loading').textContent = t('lead.loading', 'Loading leads…');

  (async () => {
    const tbody = document.getElementById('leads-tbody');
    try {
      const { leads } = await apiRequest('/api/leads');
      if (!leads.length) {
        tbody.innerHTML = `<tr><td colspan="7" class="muted-note" style="padding:1.5rem;">${t('lead.empty', "No leads submitted yet — they'll appear here as soon as someone fills out the Contact form.")}</td></tr>`;
        return;
      }
      tbody.innerHTML = leads.map(l => `
        <tr>
          <td>${l.full_name}</td>
          <td>${l.work_email}</td>
          <td>${l.organization || '—'}</td>
          <td><span class="badge badge-neutral">${l.organization_type || '—'}</span></td>
          <td>${l.country || '—'}</td>
          <td>${l.preferred_channels || '—'}</td>
          <td>${new Date(l.created_at + 'Z').toLocaleString()}</td>
        </tr>`).join('');
    } catch (e) {
      tbody.innerHTML = `<tr><td colspan="7" class="muted-note" style="padding:1.5rem; color:var(--danger);">${t('lead.error', 'Could not load:')} ${e.message}</td></tr>`;
    }
  })();
</script>
</body>
</html>
