<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/assets/img/logo-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enumerator App — VoiceInsights Africa</title>
<meta name="description" content="Offline-first field data collection. Works with zero network — syncs when you're back in range.">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0F1614">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VIA Enumerator">
<link rel="apple-touch-icon" href="/assets/img/icon-192.png">
<link rel="stylesheet" href="/assets/css/style.css">
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body style="min-height:100vh; padding:1.25rem;">
  <div style="max-width:480px; margin:0 auto;">

    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:1.25rem;">
      <div style="display:flex; align-items:center; gap:.6rem;">
        <div style="width:32px;height:32px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:var(--accent-ink);font-family:var(--font-display);font-weight:700;">V</div>
        <span style="font-family:var(--font-display); font-weight:600;">Enumerator App</span>
      </div>
      <span class="badge" id="net-badge">…</span>
    </div>

    <!-- ============== HOME SCREEN ============== -->
    <div id="screen-home">
      <div class="card" style="margin-bottom:1rem;">
        <div class="card-title">Today's Campaign</div>
        <div id="campaign-name" style="font-family:var(--font-display); font-size:1.1rem; font-weight:600;">Loading…</div>
        <div class="muted-note" id="campaign-note" style="margin-top:.3rem;"></div>
      </div>

      <button class="btn btn-primary" id="new-household-btn" style="width:100%; justify-content:center; margin-bottom:1rem;" disabled>
        + Start New Household
      </button>

      <div class="section-head"><h2 style="font-size:1rem;">Pending Sync (<span id="pending-count">0</span>)</h2></div>
      <div id="pending-list" style="margin-bottom:1rem;"></div>

      <button class="btn btn-ghost" id="sync-btn" style="width:100%; justify-content:center;" disabled>
        ⬆ Sync Now
      </button>
      <div id="sync-log" class="muted-note" style="margin-top:.75rem; white-space:pre-line;"></div>

      <p class="muted-note" style="text-align:center; margin-top:2rem; font-size:.75rem;">
        Everything is saved on this device first. Nothing uploads until you tap "Sync Now" — safe to use with zero signal all day.
      </p>
    </div>

    <!-- ============== RECORDING SCREEN ============== -->
    <div id="screen-record" style="display:none;">
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:.6rem;">
          <span class="muted-note" id="rec-progress-label">Question 1 of 1</span>
          <button class="btn btn-ghost btn-sm" id="cancel-household-btn">Cancel</button>
        </div>
        <div class="progress" style="margin-bottom:1.2rem;"><span id="rec-progress-bar" style="width:0%"></span></div>

        <label>Household Label (optional)</label>
        <input id="household-label" placeholder="e.g. Mama Amina, Kaya #14" style="margin-bottom:1.2rem;">

        <h2 id="rec-question-text" style="font-size:1.2rem; line-height:1.35;">Loading question…</h2>

        <div style="display:flex; flex-direction:column; align-items:center; gap:1rem; margin: 1.8rem 0;">
          <button id="rec-btn" style="width:76px; height:76px; border-radius:50%; background:var(--accent); border:none; color:var(--accent-ink); cursor:pointer; display:flex; align-items:center; justify-content:center;">
            <i data-lucide="mic" style="width:28px; height:28px;"></i>
          </button>
          <div id="rec-wave" style="min-height:28px;"></div>
          <div class="muted-note" id="rec-status">Tap to record the respondent's answer</div>
          <audio id="playback" controls style="display:none; width:100%; margin-top:.5rem;"></audio>
        </div>

        <div style="margin:.8rem 0; text-align:center;">
          <label for="photo-input" class="btn btn-ghost btn-sm" style="cursor:pointer; display:inline-flex; align-items:center; gap:.4rem;">
            <i data-lucide="camera" style="width:16px; height:16px;"></i> <span id="photo-label-text">Add Photo (optional)</span>
          </label>
          <input type="file" id="photo-input" accept="image/*" capture="environment" style="display:none;">
          <img id="photo-preview" alt="Photo preview" style="display:none; max-width:120px; max-height:120px; border-radius:8px; margin-top:.5rem;">
        </div>

        <button class="btn btn-primary" id="save-answer-btn" style="width:100%; justify-content:center;" disabled>Save & Next</button>
      </div>
    </div>

  </div>
<script src="/assets/js/config.js"></script>
<script src="/assets/js/i18n.js"></script>
<script src="/assets/js/app.js"></script>
<script src="/assets/js/offline-db.js"></script>
<script>
  lucide.createIcons();
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {/* offline on very first visit — fine */});
  }

  // ---------- SYNC REMINDER (Task 6.3) ----------
  // The server has NO visibility into what's still sitting unsynced in this
  // device's local IndexedDB — a genuine architectural limit, not something
  // a server-side push can solve. This is therefore a LOCAL notification
  // (Notification API directly, no FCM/server round-trip needed), shown if
  // pending data has been sitting unsynced for more than 2 hours.
  const SYNC_REMINDER_HOURS = 2;
  async function checkSyncReminder() {
    try {
      const households = await OfflineDB.getAllHouseholds();
      const pending = households.filter(h => !h.synced);
      if (!pending.length) { localStorage.removeItem('vi_first_pending_at'); return; }

      let firstPendingAt = localStorage.getItem('vi_first_pending_at');
      if (!firstPendingAt) {
        firstPendingAt = Date.now().toString();
        localStorage.setItem('vi_first_pending_at', firstPendingAt);
        return;
      }
      const hoursWaiting = (Date.now() - parseInt(firstPendingAt)) / (1000 * 60 * 60);
      if (hoursWaiting >= SYNC_REMINDER_HOURS && Notification.permission === 'granted') {
        new Notification('Unsynced Interviews Waiting', {
          body: `You have ${pending.length} interview(s) waiting to sync. Connect to the internet and open the app to sync them.`,
          icon: '/assets/img/icon-192.png',
        });
        localStorage.setItem('vi_first_pending_at', Date.now().toString()); // reset so it doesn't repeat every load
      }
    } catch (e) { /* best-effort only — never block the app over this */ }
  }
  checkSyncReminder();
  setInterval(checkSyncReminder, 30 * 60 * 1000); // re-check every 30 minutes while the app is open

  // Best-effort battery reporting — lets a supervisor see if a field device is
  // running low, without blocking anything if the Battery API isn't available
  // (it's been removed from some browsers for privacy reasons).
  if (navigator.getBattery) {
    navigator.getBattery().then(battery => {
      function reportBattery() {
        apiRequest('/api/my-work/device-status', { method: 'POST', body: { battery_pct: battery.level * 100 } }).catch(() => {});
      }
      reportBattery();
      battery.addEventListener('levelchange', reportBattery);
    }).catch(() => {});
  }

  const campaignId = new URLSearchParams(window.location.search).get('campaign') || 'camp_default';
  const netBadge = document.getElementById('net-badge');
  const newHouseholdBtn = document.getElementById('new-household-btn');
  const syncBtn = document.getElementById('sync-btn');
  const syncLog = document.getElementById('sync-log');
  const pendingList = document.getElementById('pending-list');
  const pendingCount = document.getElementById('pending-count');
  const campaignNameEl = document.getElementById('campaign-name');
  const campaignNoteEl = document.getElementById('campaign-note');

  let questions = [];

  function updateNetBadge() {
    const online = navigator.onLine;
    netBadge.textContent = online ? 'Online' : 'Offline';
    netBadge.className = 'badge ' + (online ? 'badge-success' : 'badge-neutral');
    syncBtn.disabled = !online;
  }
  window.addEventListener('online', updateNetBadge);
  window.addEventListener('offline', updateNetBadge);
  updateNetBadge();

  async function loadQuestions() {
    if (navigator.onLine) {
      try {
        const res = await fetch(`${API_BASE_URL}/api/public/campaigns/${campaignId}/questions`);
        const data = await res.json();
        if (res.ok) {
          const cached = await OfflineDB.getCachedQuestions(campaignId);
          const pendingCount = (await OfflineDB.getAllHouseholds()).filter(h => !h.synced).length;

          // If the survey was edited on the server AND there are still unsynced
          // interviews recorded against the OLD question set, do NOT silently
          // switch to the new questions yet — those pending answers were
          // recorded against the old ones (matched by question_id, so they'll
          // still sync correctly), but showing new questions for the NEXT
          // household while old ones are still pending would confuse the
          // enumerator about which version is "live". Warn instead.
          const versionChanged = cached && cached.surveyVersion && data.survey_version && cached.surveyVersion !== data.survey_version;
          if (versionChanged && pendingCount > 0) {
            questions = cached.questions; // keep using the old cached set for now — safe, still valid for pending syncs
            campaignNameEl.textContent = cached.campaignName;
            campaignNoteEl.innerHTML = `⚠️ Project updated on the server, but you have <b>${pendingCount} pending interview(s)</b> using the old questions. <button class="btn btn-ghost btn-sm" id="force-update-btn" style="padding:.2em .6em; font-size:.75rem;">Sync first, then tap here to update</button>`;
            newHouseholdBtn.disabled = false;
            const forceBtn = document.getElementById('force-update-btn');
            if (forceBtn) forceBtn.addEventListener('click', async () => {
              if ((await OfflineDB.getAllHouseholds()).filter(h => !h.synced).length > 0) {
                showToast('Please sync all pending interviews first.', 'error'); return;
              }
              questions = data.questions || [];
              await OfflineDB.cacheQuestions(campaignId, data.campaign.name, questions, data.survey_version);
              campaignNameEl.textContent = data.campaign.name;
              campaignNoteEl.textContent = `${questions.length} questions · updated to latest version`;
              newHouseholdBtn.disabled = questions.length === 0;
            });
            return;
          }

          questions = data.questions || [];
          await OfflineDB.cacheQuestions(campaignId, data.campaign.name, questions, data.survey_version);
          campaignNameEl.textContent = data.campaign.name;
          campaignNoteEl.textContent = `${questions.length} questions · synced just now`;
          newHouseholdBtn.disabled = questions.length === 0;
          return;
        }
      } catch (e) { /* fall through to cache */ }
    }
    const cached = await OfflineDB.getCachedQuestions(campaignId);
    if (cached) {
      questions = cached.questions;
      campaignNameEl.textContent = cached.campaignName;
      campaignNoteEl.textContent = `${questions.length} questions · offline copy from earlier sync`;
      newHouseholdBtn.disabled = questions.length === 0;
    } else {
      campaignNameEl.textContent = 'No campaign cached yet';
      campaignNoteEl.textContent = 'Open this app once while online to download the survey questions.';
    }
  }

  async function refreshPendingList() {
    const households = await OfflineDB.getAllHouseholds();
    const pending = households.filter(h => !h.synced);
    pendingCount.textContent = pending.length;
    syncBtn.disabled = !navigator.onLine || pending.length === 0;
    if (!pending.length) {
      pendingList.innerHTML = `<div class="muted-note">No households waiting — you're all synced.</div>`;
      return;
    }
    pendingList.innerHTML = pending.map(h => `
      <div class="card" style="margin-bottom:.6rem; padding:.9rem; display:flex; justify-content:space-between; align-items:center;">
        <div>
          <div style="font-size:.9rem; font-weight:600;">${h.label || 'Unlabeled household'}</div>
          <div class="muted-note">${h.answers.length} answer${h.answers.length === 1 ? '' : 's'} · ${new Date(h.createdAt).toLocaleString()}</div>
        </div>
        <span class="badge badge-warn">Pending</span>
      </div>`).join('');
  }

  loadQuestions();
  refreshPendingList();

  // ---------------- Recording screen ----------------
  const screenHome = document.getElementById('screen-home');
  const screenRecord = document.getElementById('screen-record');
  const btn = document.getElementById('rec-btn');
  const status = document.getElementById('rec-status');
  const wave = document.getElementById('rec-wave');
  const playback = document.getElementById('playback');
  const saveAnswerBtn = document.getElementById('save-answer-btn');
  const progressLabel = document.getElementById('rec-progress-label');
  const progressBar = document.getElementById('rec-progress-bar');
  const qText = document.getElementById('rec-question-text');
  const labelInput = document.getElementById('household-label');

  let currentHousehold = null, currentIndex = 0, mediaRecorder, chunks = [], audioBlob = null, photoBlob = null, recording = false, waveTimer;

  // A persistent per-device ID (same value across all interviews on this
  // tablet/phone) — lets an admin later see which device collected what,
  // useful for quality checks without identifying individual enumerators by name.
  function getEnumeratorDeviceId() {
    let id = localStorage.getItem('vi_enumerator_device_id');
    if (!id) {
      id = 'enum_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
      localStorage.setItem('vi_enumerator_device_id', id);
    }
    return id;
  }

  // GPS is entirely optional and best-effort: if the browser has no location
  // permission, or the device has no GPS, interviews still save and sync
  // normally — this only adds context when it's available.
  function captureGpsForHousehold(household) {
    if (!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        household.gpsLat = pos.coords.latitude;
        household.gpsLng = pos.coords.longitude;
        household.gpsAccuracy = pos.coords.accuracy;
        OfflineDB.saveHousehold(household).catch(() => {});
      },
      () => { /* permission denied or unavailable — silently proceed without GPS */ },
      { timeout: 8000, maximumAge: 60000 }
    );
  }

  newHouseholdBtn.addEventListener('click', () => {
    // The enumerator (not the respondent) confirms here that verbal consent was
    // actually obtained out loud before recording starts — this flag travels
    // with every answer submitted for this household, same as the Web channel.
    const consentGiven = confirm('Have you asked this person for their consent to participate, and did they agree?\n\nTap OK only if they said yes.');
    if (!consentGiven) return;
    currentHousehold = { id: 'hh_' + Date.now() + '_' + Math.random().toString(36).slice(2), label: '', answers: [], createdAt: Date.now(), synced: false, deviceId: getEnumeratorDeviceId(), gpsLat: null, gpsLng: null, gpsAccuracy: null, consentGiven: true };
    captureGpsForHousehold(currentHousehold);
    currentIndex = 0;
    labelInput.value = '';
    showQuestion();
    screenHome.style.display = 'none';
    screenRecord.style.display = 'block';
  });

  document.getElementById('cancel-household-btn').addEventListener('click', () => {
    if (confirm('Discard this household? Nothing recorded so far will be saved.')) {
      screenRecord.style.display = 'none';
      screenHome.style.display = 'block';
      refreshPendingList();
    }
  });

  function showQuestion() {
    const q = questions[currentIndex];
    qText.textContent = q.question_text;
    progressLabel.textContent = `Question ${currentIndex + 1} of ${questions.length}`;
    progressBar.style.width = Math.round((currentIndex / questions.length) * 100) + '%';
    audioBlob = null;
    photoBlob = null;
    document.getElementById('photo-preview').style.display = 'none';
    document.getElementById('photo-label-text').textContent = 'Add Photo (optional)';
    document.getElementById('photo-input').value = '';
    playback.style.display = 'none';
    saveAnswerBtn.disabled = true;
    status.textContent = 'Tap to record the respondent\'s answer';
    lucide.createIcons();
  }

  btn.addEventListener('click', async () => {
    if (!recording) {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        chunks = [];
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
        mediaRecorder.onstop = () => {
          audioBlob = new Blob(chunks, { type: 'audio/webm' });
          playback.src = URL.createObjectURL(audioBlob);
          playback.style.display = 'block';
          saveAnswerBtn.disabled = false;
          stream.getTracks().forEach(t => t.stop());
        };
        mediaRecorder.start();
        recording = true;
        status.textContent = 'Recording… tap again to stop';
        wave.innerHTML = makeWaveform(20, true);
        clearInterval(waveTimer);
        waveTimer = setInterval(() => { wave.innerHTML = makeWaveform(20, true); }, 900);
        btn.style.background = 'var(--danger)';
      } catch (err) {
        status.textContent = 'Microphone access denied.';
      }
    } else {
      mediaRecorder.stop();
      recording = false;
      clearInterval(waveTimer);
      status.textContent = 'Recording ready — Save & Next when ready';
      wave.innerHTML = '';
      btn.style.background = 'var(--accent)';
    }
  });

  document.getElementById('photo-input').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    photoBlob = file;
    const preview = document.getElementById('photo-preview');
    preview.src = URL.createObjectURL(file);
    preview.style.display = 'block';
    document.getElementById('photo-label-text').textContent = 'Photo attached ✓ (tap to change)';
  });

  saveAnswerBtn.addEventListener('click', async () => {
    if (!audioBlob) return;
    const q = questions[currentIndex];
    currentHousehold.label = labelInput.value.trim();
    currentHousehold.answers.push({ questionIndex: currentIndex, questionId: q.id, blob: audioBlob, photoBlob: photoBlob || null, synced: false });

    currentIndex++;
    if (currentIndex >= questions.length) {
      await OfflineDB.saveHousehold(currentHousehold);
      screenRecord.style.display = 'none';
      screenHome.style.display = 'block';
      refreshPendingList();
    } else {
      showQuestion();
    }
  });

  // ---------------- Sync ----------------
  // Resumes from the EXACT answer that failed last time — never re-sends an
  // answer already confirmed by the server, and never skips ahead past one
  // that failed. Progress is saved to local storage after every single
  // answer (not just at the end), so even a mid-sync crash or connection
  // drop loses at most one answer's worth of progress, never more.
  syncBtn.addEventListener('click', async () => {
    if (!navigator.onLine) return;
    syncBtn.disabled = true;
    const households = (await OfflineDB.getAllHouseholds()).filter(h => !h.synced);
    let householdsDone = 0, householdsFailed = 0;
    syncLog.textContent = `Syncing ${households.length} household(s)…`;

    for (const h of households) {
      const sessionKey = h.id; // stable per household, so the backend groups all its answers into one response
      const sorted = [...h.answers].sort((a, b) => a.questionIndex - b.questionIndex);
      let allSynced = true;

      for (const ans of sorted) {
        if (ans.synced) continue; // already confirmed by the server on a previous attempt — skip, don't resend
        try {
          const form = new FormData();
          form.append('audio', ans.blob, 'answer.webm');
          if (ans.photoBlob) form.append('photo', ans.photoBlob, 'photo.jpg');
          form.append('session_key', sessionKey);
          form.append('campaign_id', campaignId);
          form.append('language', 'sw');
          if (ans.questionId) form.append('question_id', ans.questionId); // pins this answer to the exact question it was recorded against, even if the survey has since been edited
          if (h.deviceId) form.append('device_id', h.deviceId);
          form.append('consent', h.consentGiven ? '1' : '0');
          if (h.gpsLat != null) {
            form.append('gps_lat', h.gpsLat);
            form.append('gps_lng', h.gpsLng);
            form.append('gps_accuracy', h.gpsAccuracy);
          }
          const token = localStorage.getItem('vi_token');
          const res = await fetch(`${API_BASE_URL}/api/web/submit`, {
            method: 'POST', body: form,
            headers: token ? { Authorization: `Bearer ${token}` } : {},
          });
          if (!res.ok) { allSynced = false; break; } // stop at the first failure — don't skip ahead out of order
          ans.synced = true;
          await OfflineDB.saveHousehold(h); // persist immediately, so a crash right after this doesn't lose the confirmation
        } catch (e) {
          allSynced = false; break;
        }
      }

      if (allSynced) {
        h.synced = true;
        await OfflineDB.saveHousehold(h);
        householdsDone++;
      } else {
        householdsFailed++;
      }
      syncLog.textContent = `Synced ${householdsDone}/${households.length}${householdsFailed ? `, ${householdsFailed} incomplete (will resume from where it stopped next sync)` : ''}…`;
    }

    syncLog.textContent = `Done. ${householdsDone} household(s) fully synced${householdsFailed ? `, ${householdsFailed} incomplete — try again when signal improves, it will pick up exactly where it left off.` : '.'}`;
    refreshPendingList();
    updateNetBadge();
  });
</script>
<script src="/assets/js/production-routing-v2102.js"></script>
</body>
</html>
