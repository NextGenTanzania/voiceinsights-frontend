<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VoiceInsights Operations Center</title>
  <link rel="stylesheet" href="../assets/css/vrds-tokens.css" />
  <link rel="stylesheet" href="../assets/css/vrds-components.css" />
  <style>
    body { margin:0; font-family: Inter, Segoe UI, Arial, sans-serif; background:#f8fafc; color:#0f172a; }
    main { max-width: 1180px; margin: 0 auto; padding: 32px; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap:16px; }
    .card { background:white; border:1px solid #e2e8f0; border-radius:16px; padding:18px; box-shadow:0 10px 30px rgba(15,23,42,.06); }
    .metric { font-size:30px; font-weight:700; margin:8px 0 2px; }
    .label { color:#475569; font-size:13px; }
    .status { display:inline-flex; padding:6px 10px; border-radius:999px; font-weight:600; font-size:12px; }
    .ok { background:#dcfce7; color:#166534; } .warn { background:#fef3c7; color:#92400e; } .crit { background:#fee2e2; color:#991b1b; }
    pre { white-space:pre-wrap; overflow:auto; background:#0f172a; color:#e2e8f0; padding:14px; border-radius:12px; }
  </style>
</head>
<body>
<main>
  <p class="label">Internal Operations</p>
  <h1>Platform Health Center</h1>
  <p>This internal page reads operational APIs for health, alerts, capacity and dashboard metrics. It requires a Super Admin token in localStorage.</p>
  <section id="status" class="card">Loading operational status…</section>
  <section id="metrics" class="grid" aria-label="Operational metrics"></section>
  <section class="card"><h2>Alerts</h2><div id="alerts">Loading…</div></section>
  <section class="card"><h2>Raw Operations Snapshot</h2><pre id="raw">Loading…</pre></section>
</main>
<script>
const token = localStorage.getItem('vi_token') || localStorage.getItem('token') || '';
async function api(path){ const r = await fetch(path,{headers:{Authorization:`Bearer ${token}`}}); if(!r.ok) throw new Error('Operations data is unavailable.'); return r.json(); }
function badge(status){ const cls = status==='critical'?'crit':status==='warning'||status==='degraded'?'warn':'ok'; return `<span class="status ${cls}">${status||'operational'}</span>`; }
async function load(){
  try{
    const [health,dash,alerts] = await Promise.all([api('/api/ops/health-center'), api('/api/ops/dashboard'), api('/api/ops/alerts')]);
    const h = health.health_center, d = dash.operational_dashboard;
    document.getElementById('status').innerHTML = `<h2>Overall Status ${badge(h.status)}</h2><p class="label">Checked ${h.checked_at}</p>`;
    const cards = [
      ['Active organizations', d.overview.active_organizations], ['Active projects', d.overview.active_projects], ['Running surveys', d.overview.running_surveys], ['Daily reports', d.overview.daily_reports_generated], ['Exports generated', d.overview.exports_generated], ['Pending AI jobs', d.operations.pending_ai_jobs], ['Rendering queue', d.operations.rendering_queue], ['Failed jobs', d.operations.retry_queue]
    ];
    document.getElementById('metrics').innerHTML = cards.map(([l,v])=>`<article class="card"><div class="label">${l}</div><div class="metric">${v ?? 0}</div></article>`).join('');
    document.getElementById('alerts').innerHTML = `${badge(alerts.alerts.status)} ${alerts.alerts.warning} warning(s), ${alerts.alerts.critical} critical alert(s)`;
    document.getElementById('raw').textContent = JSON.stringify({health,dash,alerts}, null, 2);
  }catch(e){ document.getElementById('status').innerHTML = `<h2>Operations data unavailable</h2><p>${e.message}</p>`; }
}
load();
</script>
</body></html>
