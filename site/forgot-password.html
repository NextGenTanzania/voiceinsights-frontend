<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/assets/img/logo-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password — VoiceInsights Africa</title>
<link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
<main id="main-content" style="min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:2rem;">
<h1 class="visually-hidden">Forgot Password — VoiceInsights Africa</h1>

  <div style="width:100%; max-width:400px;">
    <div style="display:flex;align-items:center;gap:.6rem; margin-bottom:2.5rem; justify-content:center;">
      <img src="/assets/img/logo-icon.png" alt="VoiceInsights Africa" style="height:42px; width:auto;">
      <span style="font-family:var(--font-display); font-weight:600; font-size:1.2rem;">VoiceInsights Africa</span>
    </div>

    <div class="card">
      <h2 style="font-size:1.3rem; margin-bottom:.3rem;">Reset your password</h2>
      <p style="margin-bottom:1.5rem;">Enter your email and we'll send you a link to choose a new password.</p>

      <form id="forgot-form">
        <div class="field">
          <label>Email address</label>
          <input aria-label="you@organization.com" id="email" type="email" placeholder="you@organization.com" required>
        </div>
        <div id="forgot-error" style="display:none; color:var(--danger); font-size:.82rem; margin-bottom:1rem;"></div>
        <div id="forgot-success" style="display:none; color:var(--success); font-size:.85rem; margin-bottom:1rem;"></div>
        <button class="btn btn-primary" style="width:100%; justify-content:center;" type="submit" id="forgot-btn">Send Reset Link →</button>
      </form>

      <div style="margin-top:1.2rem; text-align:center; font-size:.82rem;">
        <a href="/login.html" style="color:var(--text-dim);">← Back to login</a>
      </div>
    </div>
  </div>
</main>

<script src="/assets/js/config.js"></script>
<script src="/assets/js/app.js"></script>
<script>
  document.getElementById('forgot-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('forgot-btn');
    const errBox = document.getElementById('forgot-error');
    const okBox = document.getElementById('forgot-success');
    errBox.style.display = 'none'; okBox.style.display = 'none';
    btn.disabled = true; btn.textContent = 'Sending…';
    try {
      const res = await fetch(`${API_BASE_URL}/api/auth/forgot-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: document.getElementById('email').value }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Something went wrong');
      okBox.textContent = 'If an account exists for that email, a reset link has been sent — check your inbox.';
      okBox.style.display = 'block';
      document.getElementById('forgot-form').querySelector('input').value = '';
      btn.textContent = 'Send Reset Link →';
      btn.disabled = false;
    } catch (err) {
      errBox.textContent = err.message;
      errBox.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Send Reset Link →';
    }
  });
</script>
<script src="/assets/js/production-routing.js"></script>
</body>
</html>
