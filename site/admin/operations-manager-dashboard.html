<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Operations Dashboard — VoiceInsights Africa</title><link rel="stylesheet" href="/assets/css/style.css">
<link rel="stylesheet" href="/assets/css/enterprise-dashboard-theme.css"><style>body{background:#f1f5f9}.wrap{max-width:1200px;margin:auto;padding:28px}.hero{background:linear-gradient(135deg,#06283d,#0e7490);color:#fff;padding:28px;border-radius:22px}.gridx{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px;margin-top:16px}.panel{background:#fff;border-radius:18px;padding:18px;box-shadow:0 10px 28px #0f172a18}.metric{font-size:2rem;font-weight:800;color:#0e7490}.workflow{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}.step{border:1px solid #cbd5e1;border-radius:14px;padding:14px}.row{display:flex;gap:10px;flex-wrap:wrap}.modal{display:none;position:fixed;inset:0;background:#0008;align-items:center;justify-content:center;padding:20px;z-index:99}.modal.open{display:flex}.modal .panel{width:min(680px,100%)}input,select,textarea{width:100%;padding:11px;border:1px solid #cbd5e1;border-radius:10px;margin:5px 0 10px}</style></head><body>
<a class="skip-link" href="#main-content">Skip to main content</a><main id="main-content" class="wrap"><section class="hero"><p>Daily Client Delivery & Approval Pipeline</p><h1>Operations Manager Dashboard</h1><p>Create client records, attach proposal, contract and invoice, then submit to Founder.</p></section><div id="cards" class="gridx"></div><section class="panel" style="margin-top:16px"><div class="row"><button type="button" class="btn btn-primary" id="createClient">Create Client Record</button><button type="button" class="btn btn-ghost" id="refresh">Refresh</button></div><div id="workflows" style="margin-top:14px"><p>Loading…</p></div></section></main><div class="modal" id="clientModal"><div class="panel"><h2>Create Client Record</h2><input aria-label="Client / organization name" id="clientName" placeholder="Client / organization name"><input aria-label="Project name" id="projectName" placeholder="Project name"><textarea id="clientNotes" placeholder="Meeting notes"></textarea><div class="row"><button type="button" class="btn btn-primary" id="saveClient">Create</button><button type="button" class="btn btn-ghost" data-close>Cancel</button></div></div></div><div class="modal" id="workflowModal"><div class="panel"><h2 id="wfTitle">Client Workflow</h2><div id="wfMeta"></div><label>Document type</label><select id="docType"><option value="proposal">Proposal</option><option value="contract">Contract</option><option value="invoice">Invoice</option></select><input aria-label="docFile" id="docFile" type="file"><button type="button" class="btn btn-primary" id="uploadDoc">Upload document</button><hr><button type="button" class="btn btn-primary" id="submitFounder">Submit to Founder</button><button type="button" class="btn btn-ghost" data-close>Close</button></div></div><script src="/assets/js/config.js"></script><script src="/assets/js/production-routing.js"></script><script>let selectedWorkflow=null;const esc=v=>String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));async function load(){try{const [d,w]=await Promise.all([viApi('/api/production-finalization/dashboard/operations'),viApi('/api/enterprise-control/workflows')]);cards.innerHTML=Object.entries(d.cards||{}).map(([k,v])=>`<div class="panel"><div>${esc(k.replaceAll('_',' '))}</div><div class="metric">${esc(v&&typeof v==='object'?(v.display||v.status||'Not yet measured'):v)}</div></div>`).join('');const rows=w.workflows||[];workflows.innerHTML=rows.length?`<div class="workflow">${rows.map(r=>`<div class="step"><strong>${esc(r.client_name)}</strong><p>${esc(r.project_name||'Project pending')}</p><p><small>${esc(r.stage)}</small></p><button type="button" class="btn btn-ghost" onclick="openWorkflow('${r.id}')">Open workflow</button></div>`).join('')}</div>`:'<p>No client workflows yet.</p>'}catch(e){workflows.innerHTML=`<p>${esc(e.message)}</p>`}}createClient.onclick=()=>clientModal.classList.add('open');saveClient.onclick=async()=>{try{await viApi('/api/enterprise-control/workflows',{method:'POST',body:JSON.stringify({client_name:clientName.value,project_name:projectName.value,metadata:{meeting_notes:clientNotes.value}})});viToast('Client record created');clientModal.classList.remove('open');load()}catch(e){viToast(e.message,'error')}};async function openWorkflow(id){try{const d=await viApi('/api/enterprise-control/workflows/'+encodeURIComponent(id));selectedWorkflow=d.workflow;wfTitle.textContent=selectedWorkflow.client_name;wfMeta.innerHTML=`<p>Project: ${esc(selectedWorkflow.project_name||'—')}</p><p>Stage: ${esc(selectedWorkflow.stage)}</p><p>Proposal: ${esc(selectedWorkflow.proposal_reference||'Not uploaded')}</p><p>Contract: ${esc(selectedWorkflow.contract_reference||'Not uploaded')}</p><p>Invoice: ${esc(selectedWorkflow.invoice_reference||'Not uploaded')}</p>`;workflowModal.classList.add('open')}catch(e){viToast(e.message,'error')}}uploadDoc.onclick=async()=>{if(!selectedWorkflow||!docFile.files[0])return viToast('Choose a file','error');const fd=new FormData();fd.append('document_type',docType.value);fd.append('file',docFile.files[0]);try{const r=await fetch(API_BASE_URL+`/api/enterprise-control/workflows/${encodeURIComponent(selectedWorkflow.id)}/documents`,{method:'POST',headers:{Authorization:`Bearer ${localStorage.getItem('vi_token')||''}`},body:fd});const d=await r.json();if(!r.ok)throw new Error(d.error||'Upload failed');viToast('Document uploaded');openWorkflow(selectedWorkflow.id);load()}catch(e){viToast(e.message,'error')}};submitFounder.onclick=async()=>{if(!selectedWorkflow)return;try{await viApi('/api/production-finalization/approvals/submit',{method:'POST',body:JSON.stringify({organization_name:selectedWorkflow.client_name,project_name:selectedWorkflow.project_name,proposal_url:selectedWorkflow.proposal_reference,contract_url:selectedWorkflow.contract_reference,invoice_url:selectedWorkflow.invoice_reference,workflow_id:selectedWorkflow.id})});await viApi(`/api/enterprise-control/workflows/${selectedWorkflow.id}/transition`,{method:'POST',body:JSON.stringify({stage:'submitted_for_approval'})});viToast('Submitted to Founder');workflowModal.classList.remove('open');load()}catch(e){viToast(e.message,'error')}};document.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>b.closest('.modal').classList.remove('open'));refresh.onclick=load;load();</script></body></html>
