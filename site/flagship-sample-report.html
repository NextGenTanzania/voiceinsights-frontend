<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Flagship Sample Report | VoiceInsights Africa</title><link rel="stylesheet" href="/assets/css/style.css"><style>
:root{--bg:#07100d;--panel:#0e1916;--line:#244038;--ink:#eef6f2;--muted:#a6bbb2;--gold:#d4af37}*{box-sizing:border-box}html{scroll-behavior:smooth}body{background:var(--bg);color:var(--ink);margin:0}.wrap{max-width:1320px;margin:auto;padding:18px clamp(14px,3vw,34px)}.topbar{display:flex;justify-content:space-between;gap:12px;align-items:center;position:sticky;top:0;z-index:9;padding:12px 0;background:#07100de8;backdrop-filter:blur(12px)}.topbar a{color:var(--gold)}.cover{border-radius:28px;padding:clamp(28px,6vw,76px);min-height:520px;display:flex;flex-direction:column;justify-content:flex-end;position:relative;overflow:hidden}.cover:before{content:"";position:absolute;width:430px;height:430px;border:80px solid #ffffff18;border-radius:50%;right:-130px;top:-120px}.cover-logo{position:absolute;left:clamp(24px,6vw,76px);top:clamp(24px,5vw,56px);display:flex;align-items:center;gap:12px}.cover-logo img{width:54px;height:54px;object-fit:contain}.cover-logo strong{font-size:1.05rem;letter-spacing:.08em}.cover small{letter-spacing:.15em;font-weight:800}.cover h1{font-size:clamp(2.3rem,6vw,5.6rem);line-height:.96;margin:.18em 0;max-width:1000px}.cover p{font-size:clamp(1rem,2vw,1.35rem);max-width:780px}.actions{display:flex;gap:9px;flex-wrap:wrap;margin:18px 0}.actions a,.toc a{background:#d4af37;color:#111;padding:10px 14px;border-radius:10px;text-decoration:none;font-weight:800}.actions a:not(:first-child){background:#14241f;color:var(--ink);border:1px solid var(--line)}.panel{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:clamp(18px,3vw,30px);margin:20px 0}.kpis{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:10px}.kpi{background:#14241f;padding:15px;border-radius:14px}.kpi strong{font-size:1.4rem;display:block}.toc{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px}.toc a{white-space:nowrap;background:#13231e;color:#d8e9e1;border:1px solid var(--line);font-size:.78rem}.grid2{display:grid;grid-template-columns:1.25fr .75fr;gap:20px}.finding,.recommendation,.quote{border-left:4px solid var(--gold);padding:14px 16px;margin:12px 0;background:#101f1b;border-radius:0 12px 12px 0}.recommendation{border-left-color:#3ad29f}.quote{border-left-color:#63a7ff;font-style:italic}.charts{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}.chart{background:#0b1512;border:1px solid var(--line);border-radius:16px;padding:16px;min-width:0}.chart h3{margin:0 0 12px}.bars{display:grid;gap:9px}.barrow{display:grid;grid-template-columns:minmax(100px,1fr) 3fr 48px;gap:10px;align-items:center;font-size:.82rem}.track{height:12px;background:#1b3029;border-radius:999px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,var(--gold),#55d6a5);border-radius:999px}.heat{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.heat div{min-height:86px;padding:12px;border-radius:12px;display:flex;flex-direction:column;justify-content:flex-end}.matrix{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.matrix div{padding:12px;border-radius:12px;background:#14241f}.table-wrap{overflow-x:auto}.table{width:100%;border-collapse:collapse;min-width:720px}.table th,.table td{padding:10px;border-bottom:1px solid var(--line);text-align:left;font-size:.84rem}.table th{color:#d8c26c}.chapter{scroll-margin-top:76px}.notice{border:1px solid #6d5a21;background:#261f0b;padding:16px;border-radius:14px;color:#f3dda0}.framework-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.framework-card{background:#101f1b;border:1px solid var(--line);border-radius:14px;padding:16px}.framework-card h3{margin-top:0}.status-applied{color:#69e0b2}.status-context{color:#f4d35e}.pill{display:inline-block;padding:5px 8px;border-radius:999px;border:1px solid var(--line);margin:3px;color:var(--muted);font-size:.74rem}
@media(max-width:980px){.kpis{grid-template-columns:repeat(3,1fr)}.grid2,.charts{grid-template-columns:1fr}}

.platinum-hero{background:linear-gradient(135deg,#101f1b,#18372e);border:1px solid #5d8f7d}.score-grid{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:10px}.score-card{padding:14px;border-radius:14px;background:#0b1512;border:1px solid var(--line);text-align:center}.score-card strong{display:block;font-size:1.55rem;color:var(--gold)}.book-nav{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}.book-nav div{padding:14px;background:#101f1b;border-radius:12px;border:1px solid var(--line)}.decision-card{padding:15px;border-radius:14px;background:#10251e;border:1px solid #2f6553;margin:10px 0}.evidence-chain{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.evidence-chain div{padding:12px;border-radius:12px;background:#0b1512;border:1px solid var(--line)}.assurance-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.assurance-card{padding:16px;border-radius:14px;background:#0b1512;border:1px solid var(--line)}.assurance-card strong{color:var(--gold)}.page-plan{display:grid;gap:10px}.page-plan div{padding:14px;border-left:4px solid var(--gold);background:#101f1b;border-radius:0 12px 12px 0}
@media(max-width:980px){.score-grid{grid-template-columns:repeat(3,1fr)}.book-nav{grid-template-columns:repeat(2,1fr)}}
@media(max-width:760px){.assurance-grid{grid-template-columns:1fr}}@media(max-width:620px){.score-grid{grid-template-columns:repeat(2,1fr)}.book-nav,.evidence-chain{grid-template-columns:1fr}}
@media(max-width:760px){.framework-grid{grid-template-columns:1fr}}@media(max-width:620px){.wrap{padding:12px}.cover{min-height:430px;border-radius:20px;padding:24px}.topbar .brand{display:none}.kpis{grid-template-columns:repeat(2,1fr)}.charts{grid-template-columns:1fr}.heat{grid-template-columns:repeat(2,1fr)}.actions a{flex:1 1 calc(50% - 8px);text-align:center}.actions a:first-child{flex-basis:100%}.barrow{grid-template-columns:90px 1fr 40px}.panel{border-radius:15px}}
</style></head><body>
<a class="skip-link" href="#main-content">Skip to main content</a><div class="wrap"><div class="topbar"><a href="/sample-reports.html">← Report Library</a><span class="brand">VoiceInsights Africa · Full Flagship Demonstration</span></div><div id="app">Loading full report…</div></div><script src="/assets/js/config.js"></script><script>
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const pct=n=>Math.max(0,Math.min(100,Number(n)||0));
function barChart(v){return `<div class="bars">${(v.data||[]).slice(0,10).map(x=>`<div class="barrow"><span>${esc(x.label)}</span><div class="track"><div class="fill" style="width:${pct(x.value)}%"></div></div><strong>${esc(x.value)}%</strong></div>`).join('')}</div>`}
function heatChart(v){return `<div class="heat">${(v.data||[]).map(x=>{const n=pct(x.value),c=n<58?'#8f2d2d':n<70?'#8a6d1d':'#176b50';return `<div style="background:${c}"><strong>${esc(x.label)}</strong><span>${n}% · ${esc(x.risk||'')}</span></div>`}).join('')}</div>`}
function matrixChart(v){return `<div class="matrix">${(v.data||[]).slice(0,8).map(x=>`<div><strong>${esc(x.label)}</strong><p>Impact: ${esc(x.impact||x.value||'—')} · Feasibility: ${esc(x.feasibility||x.target||'—')}</p></div>`).join('')}</div>`}
function chart(v){let body=barChart(v);if(v.type==='regional_heatmap')body=heatChart(v);else if(v.type==='decision_matrix'||v.type==='risk_matrix')body=matrixChart(v);return `<article class="chart"><h3>${esc(v.title)}</h3>${body}</article>`}
function rowTable(rows,cols){return `<div class="table-wrap"><table class="table"><thead><tr>${cols.map(c=>`<th>${esc(c[1])}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${cols.map(c=>`<td>${esc(r[c[0]])}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`}
async function load(){const key=new URLSearchParams(location.search).get('key');try{const res=await fetch(`${API_BASE_URL}/api/public/flagship-sample-library/${encodeURIComponent(key)}`);if(!res.ok)throw new Error('Report not found');const d=await res.json(),x=d.sample,m=d.report,f=d.full_publication||m.full_publication,p=d.platinum||m.platinum||{},c=f.cover||x.cover;document.title=x.title+' | VoiceInsights Africa';const toc=(f.chapters||[]).map(ch=>`<a href="#${ch.id}">${esc(ch.title)}</a>`).join('');document.querySelector('#app').innerHTML=`
<section class="cover" style="background:linear-gradient(135deg,${c.primary},${c.accent})"><div class="cover-logo"><img src="/assets/img/logo-transparent.png" alt="VoiceInsights Africa logo"><strong>VOICEINSIGHTS AFRICA</strong></div><small>TIER ${x.tier} · ${esc(x.category)} · SYNTHETIC DEMONSTRATION REPORT</small><h1>${esc(x.title)}</h1><p>${esc(x.promise)}</p><div>${esc(x.country)} · ${esc(x.sector)} · ${f.sample_size.toLocaleString()} synthetic responses</div></section>
<div class="actions">${[['pdf','Download Full PDF'],['pptx','Download PowerPoint'],['docx','Download Editable Word'],['xlsx','Download Statistical Excel']].map(([ext,label])=>`<a href="${API_BASE_URL}/api/public/flagship-sample-library/${x.key}/export/${ext}">${label}</a>`).join('')}</div>
<div class="notice">${esc(d.integrity_notice)}</div>
<section class="panel platinum-hero"><small>VOICEINSIGHTS WORLD-CLASS PLATINUM REPORT ENGINE™</small><h2>Executive Intelligence Before the Report</h2><p>${esc(p.books?.executive_book?.executive_brief||m.executive_summary)}</p><div class="book-nav"><div><strong>Executive Book</strong><br><small>Decisions, risks, opportunities and confidence</small></div><div><strong>Decision Book</strong><br><small>Owner, cost, risk, timeline and expected outcome</small></div><div><strong>Evidence Book</strong><br><small>Finding-to-source traceability and verification</small></div><div><strong>Statistical Book</strong><br><small>Sampling, weighting, confidence and reproducibility</small></div></div></section>
<section class="panel"><h2>Platinum Report Intelligence Score</h2><div class="score-grid">${Object.entries(p.report_intelligence_score||{}).map(([k,v])=>`<div class="score-card"><strong>${esc(v)}%</strong><small>${esc(k.replaceAll('_',' '))}</small></div>`).join('')}</div><p>AI review: <strong>${esc(p.ai_reviewer?.status||'Not assessed')}</strong> · Publication gate: <strong>${esc(p.publication_quality_gate_2?.status||'Not assessed')}</strong></p></section>
<section class="panel"><h2>Report Contents</h2><div class="toc">${toc}</div></section>
<section class="panel chapter" id="C01"><h2>Executive Intelligence</h2><p>${esc(m.executive_summary)}</p><div class="kpis">${m.kpis.map(k=>`<div class="kpi"><strong>${esc(k.value)}</strong><small>${esc(k.label)}</small></div>`).join('')}</div></section>
<section class="panel"><h2>Executive Infographics</h2><div class="charts">${f.visualizations.slice(0,6).map(chart).join('')}</div></section>
<div class="grid2"><main id="main-content"><section class="panel chapter" id="C04"><h2>Critical Findings</h2>${m.findings.map(z=>`<div class="finding"><strong>${esc(z.id)} · ${esc(z.title||'Finding')}</strong><p>${esc(z.text)}</p><small>Evidence: ${esc((z.evidence_ids||[]).join(', '))} · Confidence ${z.confidence_score}%</small></div>`).join('')}</section><section class="panel chapter" id="C10"><h2>Decision Intelligence & Recommendations</h2>${m.recommendations.map(z=>`<div class="recommendation"><strong>${esc(z.id||'')} · ${esc(z.priority)} · ${esc(z.owner)}</strong><p>${esc(z.recommendation)}</p><small>${esc(z.timeline)} · Budget: ${esc(z.budget_band||'To be costed')} · Indicator: ${esc(z.monitoring_indicator||'')}</small></div>`).join('')}</section></main><aside><section class="panel chapter" id="C03"><h2>Methodology</h2>${Object.entries(f.methodology).map(([k,v])=>`<p><strong>${esc(k.replaceAll('_',' '))}</strong><br>${esc(Array.isArray(v)?v.join(', '):v)}</p>`).join('')}</section><section class="panel"><h2>Standards & Profile</h2>${x.standards.map(s=>`<span class="pill">${esc(s)}</span>`).join('')}<p>Publication profile: <strong>${esc(x.style)}</strong></p><p>Quality gate: <strong>${esc(f.quality_gate.status)} · ${f.quality_gate.score}/100</strong></p></section></aside></div>
<section class="panel chapter" id="PLATINUM-DECISIONS"><h2>Decision Book</h2>${(p.books?.decision_book||[]).slice(0,10).map(z=>`<div class="decision-card"><strong>${esc(z.id)} · ${esc(z.priority)} · ${esc(z.owner)}</strong><h3>${esc(z.decision)}</h3><p>${esc(z.why)}</p><small>Cost: ${esc(z.cost)} · Risk: ${esc(z.risk)} · Timeline: ${esc(z.timeline)} · Indicator: ${esc(z.monitoring_indicator)}</small></div>`).join('')}</section>
<section class="panel chapter" id="PLATINUM-EVIDENCE"><h2>Evidence Intelligence Book</h2><div class="evidence-chain">${(p.books?.evidence_book||[]).slice(0,12).map(z=>`<div><strong>${esc(z.finding_id)}</strong><p>${esc(z.finding)}</p><small>${esc(z.verification)} · ${esc(z.confidence)}% · ${esc((z.evidence_ids||[]).join(', '))}</small></div>`).join('')}</div></section>
<section class="panel chapter" id="PLATINUM-ASSURANCE"><h2>Institutional & Methodology Assurance</h2><div class="assurance-grid">${Object.entries(m.research_methodology_assurance||{}).map(([k,v])=>`<div class="assurance-card"><strong>${esc(k.replaceAll('_',' '))}</strong><p>${esc(typeof v==='object'?JSON.stringify(v):v)}</p></div>`).join('')}</div></section><section class="panel chapter" id="PLATINUM-PAGE-PLAN"><h2>Full Publication Architecture · ${esc(m.publication_page_equivalent||'')}</h2><div class="page-plan">${(m.publication_architecture||[]).map(x=>`<div><strong>${esc(x.book)} · ${esc(x.pages)}</strong><p>${esc((x.sections||[]).join(' • '))}</p></div>`).join('')}</div></section><section class="panel chapter" id="PLATINUM-CITATIONS"><h2>Evidence Lineage & Citation Registry</h2>${rowTable((m.evidence_registry||[]).slice(0,20),[['evidence_id','Evidence ID'],['lineage','Lineage'],['verification_status','Verification'],['confidence_score','Confidence']])}<h3>References</h3>${rowTable((m.citation_registry||[]),[['reference_id','ID'],['citation','Citation'],['access_note','Use note']])}</section><section class="panel chapter" id="PLATINUM-STATS"><h2>Statistical Intelligence Book</h2>${rowTable([p.books?.statistical_book||{}],[['sample_design','Sample design'],['sample_size','Sample size'],['design_effect','Design effect'],['weighting','Weighting'],['response_rate_pct','Response rate %']])}<p><strong>Reliability:</strong> Cronbach alpha ${esc(p.books?.statistical_book?.reliability?.cronbach_alpha||'—')} · <strong>Regression:</strong> ${esc(p.books?.statistical_book?.regression?.status||'—')} · <strong>Trend analysis:</strong> ${esc(p.books?.statistical_book?.trend_analysis?.status||'—')}</p></section>
<section class="panel chapter" id="C03A"><h2>International Standards & Institutional Alignment</h2><p>${esc(f.international_frameworks?.publication_disclaimer||'')}</p><div class="framework-grid">${(f.standards_compliance_matrix||[]).map(z=>`<div class="framework-card"><h3>${esc(z.standard)}</h3><strong class="${z.status==='APPLIED'?'status-applied':'status-context'}">${esc(z.status)}</strong><p>${esc(z.evidence)}</p></div>`).join('')}</div><h3>SDG Contribution</h3><div class="framework-grid">${(f.sdg_alignment||[]).map(z=>`<div class="framework-card"><h3>SDG ${esc(z.goal)} · ${esc(z.contribution)}</h3><p>Indicators: ${esc((z.indicator_ids||[]).join(', '))}</p><small>${esc(z.note)}</small></div>`).join('')}</div><h3>OECD-DAC Criteria</h3>${rowTable(f.oecd_dac||[],[['criterion','Criterion'],['assessment','Assessment'],['score','Score'],['management_implication','Management implication']])}</section><section class="panel chapter" id="C03B"><h2>Results-Based Management & Theory of Change</h2><div class="framework-card"><h3>Impact</h3><p>${esc(f.rbm_results_framework?.impact||'')}</p></div><div class="framework-grid">${(f.rbm_results_framework?.outcomes||[]).map(z=>`<div class="framework-card"><h3>${esc(z.id)} · Outcome</h3><p>${esc(z.statement)}</p><small>Indicators: ${esc((z.indicators||[]).join(', '))}</small></div>`).join('')}${(f.rbm_results_framework?.outputs||[]).map(z=>`<div class="framework-card"><h3>${esc(z.id)} · Output</h3><p>${esc(z.statement)}</p></div>`).join('')}</div><h3>CHS Accountability Mapping</h3>${rowTable(f.chs_commitments||[],[['commitment_number','#'],['commitment','Commitment'],['status','Status'],['action','Action']])}</section><section class="panel chapter" id="C05"><h2>Regional Intelligence</h2>${rowTable(f.regional,[['name','Region'],['responses','Responses'],['primary_score','Performance %'],['satisfaction','Satisfaction %'],['women_pct','Women %'],['youth_pct','Youth %'],['risk','Risk']])}</section>
<section class="panel chapter" id="C06"><h2>Gender, Youth, Disability & Inclusion</h2><div class="charts">${f.visualizations.slice(3,5).map(chart).join('')}</div></section>
<section class="panel chapter" id="C07"><h2>Indicators and Target Gaps</h2>${rowTable(f.indicators,[['id','Indicator ID'],['label','Indicator'],['value','Value'],['target','Target'],['status','Status'],['trend','Trend']])}</section>
<section class="panel chapter" id="C08"><h2>Respondent Voice</h2>${f.quotes.map(q=>`<div class="quote"><p>${esc(q.quote)}</p><small>${esc(q.region)} · ${esc(q.respondent_group)} · ${esc(q.theme)} · ${q.confidence}% confidence</small></div>`).join('')}</section>
<section class="panel chapter" id="C09"><h2>Risk, Opportunity & Scenario Analysis</h2><div class="charts">${f.visualizations.slice(6,12).map(chart).join('')}</div></section>
<section class="panel chapter" id="C11"><h2>Implementation & Management Response</h2><p>Recommendations are designed to flow into assigned owners, budget bands, deadlines, monitoring indicators, evidence of implementation and follow-up measurement.</p>${m.recommendations.slice(0,5).map(z=>`<div class="recommendation"><strong>${esc(z.owner)} · ${esc(z.timeline)}</strong><p>${esc(z.recommendation)}</p></div>`).join('')}</section>
<section class="panel chapter" id="C12"><h2>Evidence Explorer, Evidence Register & Technical Annex</h2>${rowTable(m.evidence.slice(0,20),[['id','Evidence ID'],['type','Type'],['source','Source'],['region','Region'],['confidence_score','Confidence'],['verification','Verification']])}<h3>Data Dictionary</h3><div class="table-wrap"><table class="table"><tbody>${f.data_dictionary.map(r=>`<tr><th>${esc(r[0])}</th><td>${esc(r[1])}</td></tr>`).join('')}</tbody></table></div></section>`}catch(e){document.querySelector('#app').innerHTML=`<div class="panel">${esc(e.message)}</div>`}}
load();
</script></body></html>
