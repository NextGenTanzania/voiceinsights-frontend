<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/assets/img/logo-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sample Report — VoiceInsights Africa</title>
<link rel="stylesheet" href="/assets/css/style.css">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  @media print { .no-print { display: none !important; } body { background: #fff; } }
  .r-section { margin-bottom: 2rem; padding: 1.5rem; background: var(--surface); border-radius: 12px; border: 1px solid var(--border); }
  .r-kpi { display: inline-block; text-align: center; padding: 1rem 1.5rem; margin: 0 .5rem .5rem 0; background: var(--bg); border-radius: 10px; min-width: 140px; }
</style>
</head>
<body>
<nav class="pub-nav no-print">
  <div class="pub-nav-row1">
    <a href="/index.html" class="pub-nav-logo" style="display:flex;align-items:center;gap:.6rem;">
      <img src="/assets/img/logo-icon.png" alt="VoiceInsights Africa" style="height:34px; width:auto;">
      <span style="font-family:var(--font-display); font-weight:600; font-size:1.1rem;">VoiceInsights Africa</span>
    </a>
    <button class="mobile-nav-toggle" id="mobile-nav-toggle" aria-label="Menu"><span></span><span></span><span></span></button>
    <div class="pub-nav-collapse pub-nav-row1-right">
      <a href="/sample-reports.html" class="btn btn-ghost btn-sm">← Report Library</a>
      <a href="/contact.html" class="btn btn-primary btn-sm">Book Demo</a>
    </div>
  </div>
</nav>

<div style="max-width:960px; margin:0 auto; padding:2rem 1.5rem;">

  <div class="r-section no-print" style="background:#3a2a0a; border:1px solid var(--accent); text-align:center;">
    <b>📋 Demonstration Report</b> — Generated for product demonstration purposes. This is built from fictional data by VoiceInsights Africa's real Report Engine.
  </div>

  <div class="no-print" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; flex-wrap:wrap; gap:.6rem;">
    <div class="muted-note" id="report-status-line">Loading…</div>
    <div style="display:flex; gap:.5rem; flex-wrap:wrap;">
      <button class="btn btn-primary btn-sm" id="export-pdf-btn">🖨 Sample PDF</button>
      <button class="btn btn-ghost btn-sm" id="export-pptx-btn">📊 Sample PPT</button>
      <button class="btn btn-ghost btn-sm" id="export-summary-btn">Executive Summary</button>
    </div>
  </div>

  <div id="report-body"><p class="muted-note">Loading sample report…</p></div>

  <div class="r-section no-print" style="text-align:center;">
    <h3>Ready to see this for your own data?</h3>
    <a href="/contact.html" class="btn btn-primary" style="margin-top:.6rem;">Book a Demo</a>
  </div>
</div>

<script src="/assets/js/config.js"></script>
<script>
  const reportId = new URLSearchParams(window.location.search).get('report_id');
  let reportData = null;

  async function loadReport() {
    if (!reportId) { document.getElementById('report-body').innerHTML = '<p class="muted-note">No report_id provided.</p>'; return; }
    try {
      const res = await fetch(`${API_BASE_URL}/api/public/demo-reports/${reportId}`);
      if (!res.ok) throw new Error((await res.json()).error || 'Not found');
      reportData = await res.json();
      const dm = reportData.document_model;
      document.getElementById('report-status-line').textContent = `${dm.metadata.template_name} · ~${reportData.estimated_pages} pages · Demonstration data`;
      renderBody(dm);
      if (new URLSearchParams(window.location.search).get('download') === 'pdf') setTimeout(() => window.print(), 800);
    } catch (e) {
      document.getElementById('report-body').innerHTML = `<p class="muted-note" style="color:var(--danger);">Could not load sample report: ${e.message}</p>`;
    }
  }

  function renderBody(dm) {
    const brand = dm.branding;
    const narrative = dm.narrative || {};
    document.getElementById('report-body').innerHTML = `
      <div class="r-section" style="background:${brand.secondary_color}; color:#fff;">
        <div style="font-size:.8rem; text-transform:uppercase; letter-spacing:1px; color:${brand.primary_color};">${brand.header_text || dm.metadata.organization_name}</div>
        <h1 style="color:#fff; margin:.5rem 0;">${dm.metadata.template_name}</h1>
        <p style="color:#ccc;">${dm.metadata.campaign_name || ''} · ${dm.metadata.standards.join(', ')}</p>
      </div>

      <div class="r-section">
        <h2>At a Glance</h2>
        <div class="r-kpi"><div style="font-size:1.6rem; font-weight:700;">${dm.kpis.total_responses}</div><div class="muted-note">Total Responses</div></div>
        <div class="r-kpi"><div style="font-size:1.6rem; font-weight:700;">${dm.kpis.response_rate_pct ?? '—'}%</div><div class="muted-note">Response Rate</div></div>
        <div class="r-kpi"><div style="font-size:1.6rem; font-weight:700;">${dm.kpis.regions_covered}</div><div class="muted-note">Regions Covered</div></div>
      </div>

      ${narrative.executive_summary ? `<div class="r-section"><h2>Executive Summary</h2><p>${narrative.executive_summary}</p></div>` : ''}
      ${narrative.key_findings?.length ? `<div class="r-section"><h2>Key Findings</h2><ul>${narrative.key_findings.map(f => `<li>${f}</li>`).join('')}</ul></div>` : ''}

      <div class="r-section">
        <h2>Demographics</h2>
        <p><b>Gender:</b> ${dm.demographics.gender.map(g => `${g.label}: ${g.n}`).join(', ')}</p>
        <p><b>Regions:</b> ${dm.demographics.regions.map(r => `${r.label}: ${r.n}`).join(', ')}</p>
      </div>

      ${dm.findings.representative_quotes?.length ? `<div class="r-section"><h2>Representative Quotes</h2>${dm.findings.representative_quotes.slice(0, 4).map(q => `<p style="font-style:italic; border-left:3px solid ${brand.primary_color}; padding-left:.8rem; margin:.6rem 0;">"${q.raw_text}"</p>`).join('')}</div>` : ''}

      ${dm.recommendations ? `<div class="r-section"><h2>Recommendations</h2>
        ${dm.recommendations.immediate?.length ? `<b>Immediate</b><ul>${dm.recommendations.immediate.map(r => `<li>${r}</li>`).join('')}</ul>` : ''}
        ${dm.recommendations.medium_term?.length ? `<b>Medium-term</b><ul>${dm.recommendations.medium_term.map(r => `<li>${r}</li>`).join('')}</ul>` : ''}
      </div>` : ''}

      <div class="r-section" style="font-size:.8rem; color:var(--text-dim); border-top:2px solid ${brand.primary_color};">
        Demonstration Report — Generated for product demonstration purposes. ${brand.disclaimer_text || ''}
      </div>
    `;
    if (window.lucide) lucide.createIcons();
  }

  function trackDownload() {
    fetch(`${API_BASE_URL}/api/public/demo-reports/${reportId}/track-download`, { method: 'POST' }).catch(() => {});
  }

  document.getElementById('export-pdf-btn').addEventListener('click', () => { trackDownload(); window.print(); });

  document.getElementById('export-summary-btn').addEventListener('click', () => {
    trackDownload();
    const dm = reportData.document_model;
    const narrative = dm.narrative || {};
    const blob = new Blob([`${dm.metadata.template_name}\n\nExecutive Summary\n${narrative.executive_summary || 'Not available in this sample.'}\n\nKey Findings\n${(narrative.key_findings || []).map(f => '- ' + f).join('\n')}`], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = `executive-summary-${reportId}.txt`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  });

  document.getElementById('export-pptx-btn').addEventListener('click', () => {
    trackDownload();
    const dm = reportData.document_model;
    const narrative = dm.narrative || {};
    const pptx = new PptxGenJS();
    const ACCENT = (dm.branding.primary_color || 'E4A23A').replace('#', ''), DARK = (dm.branding.secondary_color || '1E2620').replace('#', '');
    let slide = pptx.addSlide();
    slide.background = { color: DARK };
    slide.addText('VoiceInsights Africa — Demonstration Report', { x: 0.5, y: 0.4, fontSize: 12, color: ACCENT, bold: true });
    slide.addText(dm.metadata.template_name, { x: 0.5, y: 2.0, fontSize: 28, color: 'FFFFFF', bold: true, w: 9 });
    slide = pptx.addSlide();
    slide.addText('At a Glance', { x: 0.5, y: 0.3, fontSize: 22, bold: true });
    slide.addText(`${dm.kpis.total_responses} responses · ${dm.kpis.response_rate_pct}% response rate`, { x: 0.5, y: 1.2, fontSize: 16 });
    if (narrative.key_findings?.length) {
      slide = pptx.addSlide();
      slide.addText('Key Findings', { x: 0.5, y: 0.3, fontSize: 22, bold: true });
      slide.addText(narrative.key_findings.map(f => ({ text: f + '\n', options: { bullet: true, fontSize: 14, breakLine: true } })), { x: 0.5, y: 1.1, w: 9 });
    }
    pptx.writeFile({ fileName: `sample-report-${reportId}.pptx` });
  });

  loadReport();
  lucide.createIcons();
</script>
</body>
</html>
