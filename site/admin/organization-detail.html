<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/assets/img/logo-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organization — Admin Console</title>
<link rel="stylesheet" href="/assets/css/style.css">
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div class="shell">
  <div id="sidebar-mount"></div>
  <main class="main">
    <div id="topbar-mount"></div>
    <div class="content">
      <a href="/admin/organizations.html" class="muted-note" style="font-size:.82rem;">← Back to Organizations</a>
      <div id="org-loading" class="muted-note" style="padding:2rem;">Loading organization…</div>

      <div id="org-body" style="display:none; margin-top:1rem;">
        <h1 id="org-name" style="font-size:1.5rem;">—</h1>
        <a class="btn btn-ghost btn-sm" id="org-invoice-link" href="#" style="margin-top:.5rem; display:inline-block;">💰 Generate Invoice</a>
        <div class="grid grid-4" style="margin:1.5rem 0; gap:1rem;">
          <div class="card" style="text-align:center;"><div class="card-title">Projects</div><div class="stat-value" id="org-projects">–</div></div>
          <div class="card" style="text-align:center;"><div class="card-title">Responses</div><div class="stat-value" id="org-responses">–</div></div>
          <div class="card" style="text-align:center;"><div class="card-title">Users</div><div class="stat-value" id="org-users">–</div></div>
          <div class="card" style="text-align:center;"><div class="card-title">Storage</div><div class="stat-value" id="org-storage">–</div></div>
        </div>
        <div class="card" style="margin-bottom:1.5rem;">
          <div class="card-title">Organization Health Score</div>
          <div style="display:flex; align-items:center; gap:1.5rem; margin-top:.8rem;">
            <div class="stat-value" id="health-overall" style="font-size:2.2rem;">–</div>
            <div style="flex:1; font-size:.82rem;">
              <div style="display:flex; justify-content:space-between; margin-bottom:.3rem;"><span class="muted-note">Data Completion</span><span id="health-completion">–</span></div>
              <div style="display:flex; justify-content:space-between; margin-bottom:.3rem;"><span class="muted-note">Fraud Cleanliness</span><span id="health-fraud">–</span></div>
              <div style="display:flex; justify-content:space-between; margin-bottom:.3rem;"><span class="muted-note">2FA Adoption</span><span id="health-security">–</span></div>
              <div style="display:flex; justify-content:space-between;"><span class="muted-note">Project Activity</span><span id="health-activity">–</span></div>
            </div>
          </div>
        </div>

        <div class="pill-tabs" style="margin-bottom:1.5rem;">
          <a class="otab active" data-tab="projects">Projects</a>
          <a class="otab" data-tab="people">People</a>
        </div>

        <div class="otab-panel" data-panel="projects">
          <div class="table-wrap">
            <table>
              <thead><tr><th>Project</th><th>Channel</th><th>Responses</th><th>Status</th><th></th></tr></thead>
              <tbody id="org-projects-tbody"><tr><td colspan="5" class="muted-note" style="padding:1.5rem;">Loading…</td></tr></tbody>
            </table>
          </div>
        </div>

        <div class="otab-panel" data-panel="people" style="display:none;">
          <div class="table-wrap">
            <table>
              <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th></tr></thead>
              <tbody id="org-people-tbody"><tr><td colspan="4" class="muted-note" style="padding:1.5rem;">Loading…</td></tr></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="/assets/js/config.js"></script>
<script src="/assets/js/i18n.js"></script>
<script src="/assets/js/app.js"></script>
<script>
  if (!requireLogin()) { /* redirected */ }
  const storedUserCheck = JSON.parse(localStorage.getItem('vi_user') || 'null');
  if (storedUserCheck?.role !== 'super_admin') {
    document.body.innerHTML = '<div style="display:flex; align-items:center; justify-content:center; height:100vh; text-align:center; padding:2rem;"><div><h2>Super Admin access required</h2></div></div>';
    throw new Error('Access denied — not a Super Admin');
  }
  renderShell({ role:'admin', active:'/admin/organizations.html', eyebrow:'Organization', title:'Detail' });

  const orgId = new URLSearchParams(window.location.search).get('id');
  const STATUS_BADGE = { active: 'badge-success', suspended: 'badge-danger', scheduled: 'badge-neutral', trial: 'badge-warn' };
  const CHANNEL_LABEL = { whatsapp: 'WhatsApp', phone_call: 'Phone Call', sms: 'SMS', web_link: 'Web Link', app: 'Offline App' };

  if (!orgId) {
    document.getElementById('org-loading').textContent = 'No organization specified.';
  } else {
    (async () => {
      try {
        const [{ organization }, { campaigns }, { users }] = await Promise.all([
          apiRequest(`/api/organizations/me?org_id=${orgId}`),
          apiRequest(`/api/campaigns?org_id=${orgId}`),
          apiRequest(`/api/users?org_id=${orgId}`).catch(() => ({ users: [] })),
        ]);
        document.getElementById('org-name').textContent = organization.name;
        document.getElementById('org-invoice-link').href = `/admin/invoice.html?org_id=${orgId}`;
        document.getElementById('org-projects').textContent = campaigns.length;
        const totalResponses = campaigns.reduce((s, c) => s + (c.reached_count || 0), 0);
        document.getElementById('org-responses').textContent = totalResponses;
        document.getElementById('org-users').textContent = users.length;
        document.getElementById('org-storage').textContent = (totalResponses * 0.5).toFixed(1) + ' MB';

        apiRequest(`/api/organizations/health?org_id=${orgId}`).then(health => {
          const scoreColor = health.overall_score >= 80 ? 'var(--success)' : health.overall_score >= 60 ? 'var(--warn)' : 'var(--danger)';
          document.getElementById('health-overall').textContent = health.overall_score;
          document.getElementById('health-overall').style.color = scoreColor;
          document.getElementById('health-completion').textContent = health.breakdown.data_completion + '%';
          document.getElementById('health-fraud').textContent = health.breakdown.fraud_cleanliness + '%';
          document.getElementById('health-security').textContent = health.breakdown.security_2fa + '%';
          document.getElementById('health-activity').textContent = health.breakdown.activity + '%';
        }).catch(() => {});

        document.getElementById('org-projects-tbody').innerHTML = campaigns.length
          ? campaigns.map(c => `
              <tr>
                <td><a href="/app/project.html?id=${c.id}" style="color:inherit; font-weight:600;">${c.name}</a></td>
                <td>${CHANNEL_LABEL[c.channel] || c.channel}</td>
                <td>${c.reached_count || 0}</td>
                <td><span class="badge ${STATUS_BADGE[c.status] || 'badge-neutral'}">${c.status}</span></td>
                <td><a class="btn btn-ghost btn-sm" href="/app/project.html?id=${c.id}">Open →</a></td>
              </tr>`).join('')
          : '<tr><td colspan="5" class="muted-note" style="padding:1.5rem;">No projects yet.</td></tr>';

        document.getElementById('org-people-tbody').innerHTML = users.length
          ? users.map(u => `<tr><td>${u.full_name}</td><td>${u.email}</td><td>${u.role}</td><td><span class="badge ${u.is_active ? 'badge-success' : 'badge-danger'}">${u.is_active ? 'Active' : 'Inactive'}</span></td></tr>`).join('')
          : '<tr><td colspan="4" class="muted-note" style="padding:1.5rem;">No users yet.</td></tr>';

        document.getElementById('org-loading').style.display = 'none';
        document.getElementById('org-body').style.display = 'block';
      } catch (e) {
        document.getElementById('org-loading').textContent = 'Could not load: ' + e.message;
      }
    })();
  }

  document.querySelectorAll('.otab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.otab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      document.querySelectorAll('.otab-panel').forEach(p => p.style.display = p.dataset.panel === tab.dataset.tab ? 'block' : 'none');
    });
  });
</script>
</body>
</html>
