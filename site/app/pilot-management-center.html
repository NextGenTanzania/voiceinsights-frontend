<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Pilot Management Center — VoiceInsights</title><link rel="stylesheet" href="/assets/css/style.css">
<link rel="stylesheet" href="/assets/css/enterprise-dashboard-theme.css"><style>body{background:#07110f;color:#eefbf7}.wrap{max-width:1200px;margin:auto;padding:24px}.hero{padding:28px;border-radius:22px;background:linear-gradient(135deg,#0a2b24,#123f34);margin-bottom:20px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.card{background:#0e1d19;border:1px solid #24463c;border-radius:18px;padding:18px}.metric{font-size:2rem;font-weight:900}.pipeline{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-top:18px}.stage{padding:12px;border-radius:12px;background:#132a24;text-align:center}.table{margin-top:18px;overflow:auto}table{width:100%;border-collapse:collapse}th,td{padding:12px;border-bottom:1px solid #24463c;text-align:left}@media(max-width:800px){.grid{grid-template-columns:1fr 1fr}.pipeline{grid-template-columns:1fr 1fr}.hero{padding:20px}}@media(max-width:480px){.grid{grid-template-columns:1fr}}</style></head><body>
<a class="skip-link" href="#main-content">Skip to main content</a><main id="main-content" class="wrap"><section class="hero"><p>VoiceInsights Enterprise Delivery</p><h1>Pilot Management Center</h1><p>Manage every client pilot from Founder approval and kickoff through delivery, review, closure and expansion.</p></section><section class="grid" id="metrics"></section><section class="card"><h2>Pilot Lifecycle</h2><div class="pipeline" id="stages"></div></section><section class="card table"><h2>Active Pilots</h2><table><thead><tr><th>Pilot</th><th>Status</th><th>Owner</th><th>Risk</th><th>Next milestone</th><th>End date</th></tr></thead><tbody id="rows"></tbody></table></section></main><script src="/assets/js/config.js"></script><script>async function load(){let d;try{d=await apiRequest('/api/customer-success/v2109a/pilots')}catch(e){d={metrics:{total:0,active:0,blocked:0,closing_soon:0},stages:['approved','kickoff','implementation','running','review','closed','expansion'],pilots:[]}};metrics.innerHTML=Object.entries(d.metrics||{}).map(([k,v])=>`<div class=card><div class=metric>${v}</div><div>${k.replaceAll('_',' ')}</div></div>`).join('');stages.innerHTML=(d.stages||[]).map(x=>`<div class=stage>${x}</div>`).join('');rows.innerHTML=(d.pilots||[]).map(p=>`<tr><td>${p.name}</td><td>${p.status}</td><td>${p.owner_id||'—'}</td><td>${p.risk_level||'low'}</td><td>${p.next_milestone||'—'}</td><td>${p.end_date||'—'}</td></tr>`).join('')||'<tr><td colspan=6>No pilots yet.</td></tr>'}load()</script></body></html>
