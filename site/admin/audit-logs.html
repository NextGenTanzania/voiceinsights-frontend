<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/assets/img/logo-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audit Logs — Admin Console</title>
<link rel="stylesheet" href="/assets/css/style.css">
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div class="shell">
  <div id="sidebar-mount"></div>
  <main class="main">
    <div id="topbar-mount"></div>
    <div class="content">
      <p class="muted-note" style="margin-bottom:1rem;">A real, append-only security trail — every login, invite, and 2FA change on your account is recorded here automatically.</p>
      <div class="field" style="max-width:340px; margin-bottom:1.2rem;">
        <input id="audit-search" placeholder="Search by user or action...">
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Time</th><th>User</th><th>Action</th><th>Resource</th><th>IP</th></tr></thead>
          <tbody id="audit-tbody">
            <tr><td colspan="5" class="muted-note" style="padding:1.5rem;" id="audit-loading">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>
<script src="/assets/js/config.js"></script>
<script src="/assets/js/i18n.js"></script>
<script src="/assets/js/app.js"></script>
<script>
  if (!requireLogin()) { /* redirected */ }
  renderShell({ role:'admin', active:'/admin/audit-logs.html', eyebrow:'Security', title:'Audit Logs' });
  document.getElementById('audit-loading').textContent = t('audit.loading', 'Loading…');

  const ACTION_LABEL = {
    login: 'Logged in', login_2fa: 'Logged in (2FA)', '2fa_enabled': '2FA enabled', '2fa_disabled': '2FA disabled',
    user_invited: 'Invited a team member', user_deactivated: 'Deactivated a team member',
  };

  let allLogs = [];
  function render(filterText) {
    const tbody = document.getElementById('audit-tbody');
    const filtered = filterText
      ? allLogs.filter(l => `${l.full_name || ''} ${l.email || ''} ${l.action}`.toLowerCase().includes(filterText.toLowerCase()))
      : allLogs;
    if (!filtered.length) {
      tbody.innerHTML = `<tr><td colspan="5" class="muted-note" style="padding:1.5rem;">${t('audit.empty', 'No activity recorded yet — entries appear here as your team logs in, invites people, or changes security settings.')}</td></tr>`;
      return;
    }
    tbody.innerHTML = filtered.map(l => `
      <tr>
        <td style="font-family:var(--font-mono); font-size:.8rem;">${new Date(l.created_at + 'Z').toLocaleString()}</td>
        <td>${l.full_name || l.email || 'System'}</td>
        <td>${ACTION_LABEL[l.action] || l.action}</td>
        <td class="muted-note">${l.resource_type ? l.resource_type + (l.resource_id ? ' · ' + l.resource_id.slice(0, 12) : '') : '—'}</td>
        <td class="muted-note">${l.ip_address || '—'}</td>
      </tr>`).join('');
  }

  (async () => {
    try {
      const { logs } = await apiRequest(`/api/audit-logs${new URLSearchParams(window.location.search).get('org_id') ? '?org_id=' + new URLSearchParams(window.location.search).get('org_id') : ''}`);
      allLogs = logs;
      render('');
    } catch (e) {
      document.getElementById('audit-tbody').innerHTML = `<tr><td colspan="5" class="muted-note" style="padding:1.5rem; color:var(--danger);">${t('audit.error', 'Could not load:')} ${e.message}</td></tr>`;
    }
  })();

  document.getElementById('audit-search').addEventListener('input', (e) => render(e.target.value));
</script>
<script src="/assets/js/admin-functional-qa.js"></script>
<script src="/assets/js/admin-button-qa.js"></script>
</body>
</html>
