<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><script src="/assets/js/config.js"></script><title>Evidence Export — VoiceInsights</title><style>body{font-family:Inter,system-ui,sans-serif;margin:0;background:#07110f;color:#ecfdf5}.shell{max-width:1180px;margin:auto;padding:28px}.hero{background:linear-gradient(135deg,#0f3d32,#0b6e4f);padding:28px;border-radius:20px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:16px;margin-top:20px}.card{background:#10201c;border:1px solid #25443b;border-radius:16px;padding:18px}.kpi{font-size:2rem;font-weight:800;color:#f4d35e}.btn{display:inline-block;padding:10px 14px;border-radius:10px;background:#d4af37;color:#07110f;font-weight:800;text-decoration:none;border:0;cursor:pointer}.muted{color:#a7c4ba}.bar{height:10px;background:#203a33;border-radius:99px;overflow:hidden}.bar span{display:block;height:100%;background:#34d399}</style></head><body><main class="shell"><section class="hero"><p>Procurement evidence</p><h1>Evidence Export Center</h1><p class="muted">Review evidence registry and generate a structured procurement compliance pack.</p><button class="btn" id="generate">Generate Compliance Pack</button></section><div id="content" class="grid"></div></main><script>const api=window.VI_API_BASE||"https://voiceinsights-api.kitentyatsnp.workers.dev";const token=localStorage.getItem("vi_token");async function get(p,o={}){const r=await fetch(api+p,{...o,headers:{"Content-Type":"application/json",...(token?{Authorization:`Bearer ${token}`}:{}) ,...(o.headers||{})}});const j=await r.json().catch(()=>({}));if(!r.ok)throw new Error(j.error||`HTTP ${r.status}`);return j}</script><script>async function load(){const x=await get('/api/compliance/trust/evidence');content.innerHTML=(x.evidence||[]).map(e=>`<div class="card"><h3>${e.title}</h3><p>${e.category} · ${e.verification_status}</p><small>${e.generated_at}</small></div>`).join('')||'<div class="card">No evidence registered yet.</div>'}generate.onclick=async()=>{const x=await get('/api/compliance/trust/compliance-pack',{method:'POST',body:'{}'});const b=new Blob([JSON.stringify(x.pack,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='voiceinsights-procurement-compliance-pack.json';a.click();URL.revokeObjectURL(a.href)};load().catch(e=>content.innerHTML=`<div class="card">${e.message}</div>`)</script></body></html>
