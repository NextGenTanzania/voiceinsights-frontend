<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Founder Dashboard — VoiceInsights Africa</title><link rel="stylesheet" href="/assets/css/style.css"></head><body><main class="pub-section"><h1>Founder Executive Dashboard</h1><p>Final approval, executive lock and platform control.</p><div id="cards" class="grid grid-3"></div><section class="card"><h2>Approval Decision</h2><input id="approval" placeholder="Approval ID"><select id="decision"><option value="approve">Approve</option><option value="reject">Reject</option><option value="request_changes">Request changes</option></select><button class="btn btn-primary" id="act">Submit Decision</button></section></main><script src="/assets/js/config.js"></script><script src="/assets/js/production-routing-v2102.js"></script><script>async function load(){try{const d=await viApi('/api/production-finalization-v2102/dashboard/founder');cards.innerHTML=Object.entries(d.cards).map(([k,v])=>`<div class="card"><h3>${k.replaceAll('_',' ')}</h3><strong>${v}</strong></div>`).join('')}catch(e){cards.innerHTML=`<p>${e.message}</p>`}}act.onclick=async()=>{if(!approval.value)return viToast('Enter approval ID','error');try{await viApi(`/api/production-finalization-v2102/approvals/${encodeURIComponent(approval.value)}/decision`,{method:'POST',body:JSON.stringify({decision:decision.value})});viToast('Decision recorded');load()}catch(e){viToast(e.message,'error')}};load();</script></body></html>
