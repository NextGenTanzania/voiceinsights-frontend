<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>API Keys — VoiceInsights</title><link rel="stylesheet" href="/assets/css/identity-access.css"><script src="/assets/js/config.js"></script></head><body style="margin:0;background:#f4f7f6;font-family:Arial,sans-serif">
<a class="skip-link" href="#main-content">Skip to main content</a><main id="main-content" class="iam-page"><section class="iam-hero"><p>Developer Access</p><h1>Scoped API Keys</h1><span>Create organization-bound keys with limited permissions and expiration.</span></section><form class="iam-panel" id="form"><label>Name</label><input aria-label="name" name="name" value="Integration key"><p>Select scopes:</p><label><input aria-label="scope" type="checkbox" name="scope" value="campaigns:read" checked> campaigns:read</label><br><label><input aria-label="scope" type="checkbox" name="scope" value="reports:read" checked> reports:read</label><br><label><input aria-label="scope" type="checkbox" name="scope" value="responses:write"> responses:write</label><br><button class="iam-button">Create key</button><pre id="out" style="white-space:pre-wrap"></pre></form></main><script src="/assets/js/identity-access.js"></script><script>form.onsubmit=async e=>{e.preventDefault();try{const scopes=[...document.querySelectorAll('[name=scope]:checked')].map(x=>x.value);const d=await V2103AIam.api('/api/security/v2103a/api-keys',{method:'POST',body:JSON.stringify({name:new FormData(form).get('name'),scopes})});out.textContent='API key (shown once):\n'+d.api_key;}catch(e){out.textContent=e.message}}</script></body></html>
