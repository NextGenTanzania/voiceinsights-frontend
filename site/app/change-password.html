<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/assets/img/logo-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Password Required — VoiceInsights Africa</title>
<link rel="stylesheet" href="/assets/css/style.css">
</head>
<body style="min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:2rem;">
<h1 class="visually-hidden">Change Password Required — VoiceInsights Africa</h1>

  <div style="width:100%; max-width:400px;">
    <div style="display:flex;align-items:center;gap:.6rem; margin-bottom:2.5rem; justify-content:center;">
      <img src="/assets/img/logo-icon.png" alt="VoiceInsights Africa" style="height:42px; width:auto;">
      <span style="font-family:var(--font-display); font-weight:600; font-size:1.2rem;">VoiceInsights Africa</span>
    </div>

    <div class="card">
      <h2 style="font-size:1.3rem; margin-bottom:.3rem;">Choose a new password</h2>
      <p style="margin-bottom:1.5rem;">For your account's security, you must set a new password before continuing.</p>

      <form id="cp-form" novalidate>
        <div class="field">
          <label for="cp-current">Current (temporary) password</label>
          <input aria-label="Current temporary password" id="cp-current" type="password" autocomplete="current-password" required>
        </div>
        <div class="field">
          <label for="cp-new">New password</label>
          <input aria-label="At least 8 characters" id="cp-new" type="password" placeholder="At least 8 characters" autocomplete="new-password" required minlength="8">
        </div>
        <div class="field">
          <label for="cp-confirm">Confirm new password</label>
          <input aria-label="Re-enter your new password" id="cp-confirm" type="password" placeholder="Re-enter your new password" autocomplete="new-password" required minlength="8">
        </div>
        <div id="cp-error" role="alert" style="display:none; color:var(--danger); font-size:.82rem; margin-bottom:1rem;"></div>
        <button class="btn btn-primary" style="width:100%; justify-content:center;" type="submit" id="cp-btn">Set New Password &rarr;</button>
      </form>
    </div>
  </div>

<script src="/assets/js/config.js"></script>
<script>
  if (!requireLogin()) {
    // requireLogin() already redirected to /login.html
  }

  const form = document.getElementById('cp-form');
  const btn = document.getElementById('cp-btn');
  const errBox = document.getElementById('cp-error');
  let submitting = false;

  function redirectToDashboard(user) {
    window.location.href = user && user.role === 'enumerator' ? '/app/my-work.html' : '/app/dashboard.html';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (submitting) return; // prevent duplicate submission

    errBox.style.display = 'none';

    const currentPw = document.getElementById('cp-current').value;
    const newPw = document.getElementById('cp-new').value;
    const confirmPw = document.getElementById('cp-confirm').value;

    if (newPw.length < 8) {
      errBox.textContent = 'New password must be at least 8 characters.';
      errBox.style.display = 'block';
      return;
    }
    if (newPw !== confirmPw) {
      errBox.textContent = 'New password and confirmation do not match.';
      errBox.style.display = 'block';
      return;
    }
    if (newPw === currentPw) {
      errBox.textContent = 'New password must be different from your current password.';
      errBox.style.display = 'block';
      return;
    }

    submitting = true;
    btn.disabled = true;
    btn.textContent = 'Setting password…';
    try {
      const data = await apiRequest('/api/auth/change-password', {
        method: 'POST',
        body: { current_password: currentPw, new_password: newPw },
      });
      // Replace the old (mustChangePassword-flagged) token and any stale
      // session state with the fresh one issued by this call.
      localStorage.setItem('vi_token', data.token);
      localStorage.setItem('vi_user', JSON.stringify(data.user));
      redirectToDashboard(data.user);
    } catch (err) {
      errBox.textContent = err.message.includes('Failed to fetch')
        ? 'Cannot reach the backend. Please check your connection and try again.'
        : err.message;
      errBox.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Set New Password →';
      submitting = false;
    }
  });
</script>
<script src="/assets/js/production-routing.js"></script>
</body>
</html>
