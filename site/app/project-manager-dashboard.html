<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Program & Project Manager — VoiceInsights Africa</title><link rel="stylesheet" href="/assets/css/style.css">
<link rel="stylesheet" href="/assets/css/enterprise-dashboard-theme.css"><style>body{background:#f8fafc}.wrap{max-width:1200px;margin:auto;padding:26px}.hero{background:linear-gradient(135deg,#172554,#2563eb);color:#fff;padding:28px;border-radius:22px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin-top:16px}.card{background:#fff;border-radius:18px;padding:18px;box-shadow:0 10px 28px #0f172a14}.muted{color:#64748b}</style></head><body><main class="wrap"><section class="hero"><p>Delivery, Risks & Field Progress</p><h1>Program & Project Manager Workspace</h1><p>Live projects, campaigns, assignments, owners and delivery status.</p></section><section id="projects" class="grid"><article class="card">Loading…</article></section></main><script src="/assets/js/config.js"></script><script src="/assets/js/production-routing-v2102.js"></script><script>const esc=v=>String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));async function load(){try{const d=await viApi('/api/projects/manager-dashboard');projects.innerHTML=(d.projects||[]).length?(d.projects||[]).map(p=>`<article class="card"><h2>${esc(p.name)}</h2><p class="muted">${esc(p.status)} · ${esc(p.currency||'USD')} ${Number(p.budget_value||0).toLocaleString()}</p><p>Campaigns: <b>${esc(p.campaign_count||0)}</b></p><p>Field assignments: <b>${esc(p.assignment_count||0)}</b></p><p>Owner: ${esc(p.owner_id||'Not assigned')}</p><a class="btn btn-primary" href="/app/project.html?id=${encodeURIComponent(p.id)}">Open Project</a></article>`).join(''):'<article class="card"><h2>No active projects</h2><p>Create a client workflow and complete Founder approval to provision the first project.</p></article>'}catch(e){projects.innerHTML=`<article class="card"><h2>Data unavailable</h2><p>${esc(e.message)}</p></article>`}}load();</script></body></html>
