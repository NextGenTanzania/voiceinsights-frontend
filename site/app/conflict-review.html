<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Offline Conflict Review — VoiceInsights Africa</title><link rel="stylesheet" href="/assets/css/style.css">
<link rel="stylesheet" href="/assets/css/enterprise-dashboard-theme.css"><style>body{background:#f8fafc}.wrap{max-width:1100px;margin:auto;padding:26px}.card{background:white;border-radius:18px;padding:18px;margin:12px 0;box-shadow:0 8px 24px #0f172a14}.diff{overflow:auto}.diff table{width:100%;border-collapse:collapse}.diff td,.diff th{padding:8px;border-bottom:1px solid #e2e8f0;text-align:left}</style></head><body>
<a class="skip-link" href="#main-content">Skip to main content</a><main id="main-content" class="wrap"><h1>Offline Conflict Review</h1><p>Supervisor and M&E resolution of local/server differences.</p><div id="list">Loading…</div></main><script src="/assets/js/config.js"></script><script src="/assets/js/production-routing.js"></script><script>const esc=v=>String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));async function resolve(id,resolution){try{await viApi(`/api/collection-operations/conflicts/${encodeURIComponent(id)}/resolve`,{method:'POST',body:JSON.stringify({resolution})});viToast('Conflict resolved');load()}catch(e){viToast(e.message,'error')}}async function load(){try{const d=await viApi('/api/collection-operations/conflicts');list.innerHTML=(d.conflicts||[]).length?(d.conflicts||[]).map(c=>`<article class="card"><h2>${esc(c.entity_id)}</h2><p>${esc(c.conflict_reason||'Version conflict')}</p><div class="diff"><table><tr><th>Field</th><th>Local</th><th>Server</th></tr>${c.differences.map(x=>`<tr><td>${esc(x.field)}</td><td>${esc(JSON.stringify(x.local))}</td><td>${esc(JSON.stringify(x.server))}</td></tr>`).join('')}</table></div><button type="button" class="btn btn-primary" onclick="resolve('${c.id}','accept_local')">Accept Local</button> <button type="button" class="btn" onclick="resolve('${c.id}','accept_server')">Accept Server</button> <button type="button" class="btn btn-danger" onclick="resolve('${c.id}','recollect')">Require Recollection</button></article>`).join(''):'<article class="card"><h2>No unresolved conflicts</h2></article>'}catch(e){list.innerHTML=`<article class="card"><h2>Data unavailable</h2><p>${esc(e.message)}</p></article>`}}load();</script></body></html>
