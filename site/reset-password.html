<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/assets/img/logo-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — VoiceInsights Africa</title>
<link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
<main id="main-content" style="min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:2rem;">
<h1 class="visually-hidden">Reset Password — VoiceInsights Africa</h1>

  <div style="width:100%; max-width:400px;">
    <div style="display:flex;align-items:center;gap:.6rem; margin-bottom:2.5rem; justify-content:center;">
      <img src="/assets/img/logo-icon.png" alt="VoiceInsights Africa" style="height:42px; width:auto;">
      <span style="font-family:var(--font-display); font-weight:600; font-size:1.2rem;">VoiceInsights Africa</span>
    </div>

    <div class="card" id="reset-card">
      <h2 style="font-size:1.3rem; margin-bottom:.3rem;">Choose a new password</h2>
      <p style="margin-bottom:1.5rem;">This link is valid for 1 hour and can only be used once.</p>

      <form id="reset-form">
        <div class="field">
          <label>New password</label>
          <input aria-label="At least 8 characters" id="new-password" type="password" placeholder="At least 8 characters" required minlength="8">
        </div>
        <div class="field">
          <label>Confirm new password</label>
          <input aria-label="Re enter your new password" id="confirm-password" type="password" placeholder="Re-enter your new password" required minlength="8">
        </div>
        <div id="reset-error" style="display:none; color:var(--danger); font-size:.82rem; margin-bottom:1rem;"></div>
        <button class="btn btn-primary" style="width:100%; justify-content:center;" type="submit" id="reset-btn">Reset Password →</button>
      </form>

      <div id="reset-success-box" style="display:none; text-align:center;">
        <p style="color:var(--success); margin-bottom:1rem;">✓ Your password has been reset.</p>
        <a href="/login.html" class="btn btn-primary" style="width:100%; justify-content:center;">Go to Login →</a>
      </div>

      <div id="no-token-box" style="display:none; text-align:center;">
        <p style="color:var(--danger); margin-bottom:1rem;">This reset link is missing or invalid.</p>
        <a href="/forgot-password.html" class="btn btn-primary" style="width:100%; justify-content:center;">Request a New Link</a>
      </div>
    </div>
  </div>
</main>

<script src="/assets/js/config.js"></script>
<script src="/assets/js/app.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');

  if (!token) {
    document.getElementById('reset-form').style.display = 'none';
    document.getElementById('no-token-box').style.display = 'block';
  }

  document.getElementById('reset-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('reset-btn');
    const errBox = document.getElementById('reset-error');
    errBox.style.display = 'none';

    const newPw = document.getElementById('new-password').value;
    const confirmPw = document.getElementById('confirm-password').value;
    if (newPw !== confirmPw) {
      errBox.textContent = 'Passwords do not match.';
      errBox.style.display = 'block';
      return;
    }

    btn.disabled = true; btn.textContent = 'Resetting…';
    try {
      const res = await fetch(`${API_BASE_URL}/api/auth/reset-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, new_password: newPw }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Something went wrong');
      document.getElementById('reset-form').style.display = 'none';
      document.getElementById('reset-success-box').style.display = 'block';
    } catch (err) {
      errBox.textContent = err.message;
      errBox.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Reset Password →';
    }
  });
</script>
<script src="/assets/js/production-routing.js"></script>
</body>
</html>
