<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Marketplace — VoiceInsights Africa</title><link rel="stylesheet" href="/assets/css/style.css">
<link rel="stylesheet" href="/assets/css/enterprise-dashboard-theme.css"><script src="/assets/js/config.js"></script><style>
:root{color-scheme:dark}.mk{max-width:1320px;margin:auto;padding:24px}.hero{padding:30px;border:1px solid #2d4a42;border-radius:24px;background:radial-gradient(circle at top right,rgba(227,189,91,.2),transparent 35%),linear-gradient(135deg,#0d1916,#143129)}.muted{color:#a7bcb5}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0}.toolbar input,.toolbar select{background:#09110f;color:#fff;border:1px solid #35564d;border-radius:12px;padding:12px;min-height:44px}.toolbar input{flex:1;min-width:230px}.btn{border:0;border-radius:12px;padding:11px 15px;font-weight:800;cursor:pointer;background:#e3bd5b;color:#10201c}.btn.secondary{background:#162722;color:#d5e6df;border:1px solid #365a50}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:18px}.kpi,.card{background:#101b18;border:1px solid #29443d;border-radius:18px;padding:16px}.kpi strong{display:block;color:#e3bd5b;font-size:1.6rem}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.card{display:flex;flex-direction:column}.card h3{margin:.4rem 0}.pill{display:inline-block;margin:4px 5px 0 0;padding:4px 9px;border-radius:999px;border:1px solid #3b6257;color:#b8d7ce;font-size:.75rem}.meta{display:flex;justify-content:space-between;gap:8px;color:#9fb4ad;font-size:.83rem;margin-top:auto;padding-top:12px}.category{color:#e3bd5b;font-size:.75rem;font-weight:900;text-transform:uppercase;letter-spacing:.08em}@media(max-width:900px){.grid{grid-template-columns:1fr 1fr}.kpis{grid-template-columns:1fr 1fr}}@media(max-width:620px){.grid{grid-template-columns:1fr}.mk{padding:14px}.hero{padding:22px}}
</style></head><body>
<a class="skip-link" href="#main-content">Skip to main content</a><div id="marketplace-status" class="sr-only" aria-live="assertive"></div><main id="main-content" class="mk"><section class="hero"><p class="category">VoiceInsights Marketplace™</p><h1>Extend your research and intelligence workspace</h1><p class="muted">Install trusted survey templates, AI prompts, dashboards, widgets, connectors and report products without rebuilding your workflow.</p><div class="kpis" id="kpis"></div></section><div class="toolbar"><input aria-label="Search marketplace..." id="q" placeholder="Search marketplace..."><select id="type"><option value="">All categories</option><option value="survey_template">Survey Templates</option><option value="ai_prompt">AI Prompts</option><option value="dashboard">Dashboards</option><option value="widget">Widgets</option><option value="connector">Connectors</option><option value="report_template">Reports</option></select><select id="sector"><option value="">All sectors</option><option value="health">Health</option><option value="development">Development</option><option value="research">Research</option><option value="public-sector">Public Sector</option><option value="cross-sector">Cross-sector</option></select><button type="button" class="btn" id="search">Search</button></div><section class="grid" id="catalog"><div class="card muted">Loading marketplace...</div></section></main><script>
const apiBase=window.VI_API_BASE||'https://voiceinsights-api.kitentyatsnp.workers.dev';const token=localStorage.getItem('vi_token');const headers=token?{Authorization:`Bearer ${token}`}:{};
async function api(path,opt={}){const r=await fetch(apiBase+path,{...opt,headers:{...headers,'Content-Type':'application/json',...(opt.headers||{})}});const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||`HTTP ${r.status}`);return d}
const metric=(l,v)=>`<div class="kpi"><strong>${v??0}</strong><span>${l}</span></div>`;
function card(x){return `<article class="card"><div class="category">${x.type.replaceAll('_',' ')}</div><h3>${x.name}</h3><p class="muted">${x.description}</p><div>${(x.features||[]).map(f=>`<span class="pill">${f}</span>`).join('')}</div><div class="meta"><span>★ ${x.rating} · ${x.installs} installs</span><span>${x.price}</span></div><button type="button" class="btn ${x.installed?'secondary':''}" style="margin-top:12px" onclick="installItem('${x.id}',this)">${x.installed?'Installed':'Install'}</button></article>`}
async function loadWorkspace(){try{const d=await api('/api/marketplace/v2107/workspace');const o=d.overview||{};document.getElementById('kpis').innerHTML=[['Catalog items',o.catalog_items],['Installed',o.installed],['Publishers',o.publishers],['Average rating',o.average_rating]].map(x=>metric(...x)).join('');document.getElementById('catalog').innerHTML=(d.featured||[]).map(card).join('')}catch(e){document.getElementById('catalog').innerHTML=`<div class="card">Login required to open Marketplace.<br><span class="muted">${e.message}</span></div>`}}
async function search(){const q=encodeURIComponent(document.getElementById('q').value),t=encodeURIComponent(document.getElementById('type').value),s=encodeURIComponent(document.getElementById('sector').value);const d=await api(`/api/marketplace/v2107/catalog?q=${q}&type=${t}&sector=${s}`);document.getElementById('catalog').innerHTML=d.items.length?d.items.map(card).join(''):'<div class="card muted">No matching marketplace items.</div>'}
async function installItem(id,btn){btn.disabled=true;btn.textContent='Installing...';try{const d=await api('/api/marketplace/v2107/install',{method:'POST',body:JSON.stringify({item_id:id})});btn.textContent=d.configuration_required?'Installed — configure':'Installed';btn.classList.add('secondary')}catch(e){btn.disabled=false;btn.textContent='Install';const status=document.getElementById('marketplace-status');if(status){status.textContent=e.message;status.setAttribute('role','alert')}else{console.error(e)}}}
document.getElementById('search').onclick=search;document.getElementById('q').addEventListener('keydown',e=>{if(e.key==='Enter')search()});loadWorkspace();
</script></body></html>
