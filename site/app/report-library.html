<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/assets/img/logo-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report Library — VoiceInsights Africa</title>
<link rel="stylesheet" href="/assets/css/style.css">
<link rel="stylesheet" href="/assets/css/enterprise-dashboard-theme.css">
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<h1 class="visually-hidden">Report Library — VoiceInsights Africa</h1>
<a class="skip-link" href="#main-content">Skip to main content</a>
<div class="shell">
  <div id="sidebar-mount"></div>
  <main id="main-content" class="main">
    <div id="topbar-mount"></div>
    <div class="content">

      <div class="section-head">
        <p class="muted-note" style="margin:0;">Every generated report, tracked from draft through publication.</p>
        <select id="status-filter">
          <option value="">All statuses</option>
          <option value="draft">Draft</option>
          <option value="review">In Review</option>
          <option value="approved">Approved</option>
          <option value="published">Published</option>
          <option value="archived">Archived</option>
        </select>
      </div>

      <div class="table-wrap" style="margin-top:1rem;">
        <table>
          <thead><tr><th>Report</th><th>Project</th><th>Version</th><th>Status</th><th>Generated By</th><th>Updated</th><th>Actions</th></tr></thead>
          <tbody id="reports-tbody"><tr><td colspan="7" class="muted-note" style="padding:1.5rem;">Loading…</td></tr></tbody>
        </table>
      </div>

      <div class="section-head" style="margin-top:2rem;"><h2 style="font-size:1.05rem;">Scheduled Reports</h2></div>
      <div id="schedules-list" style="margin-bottom:1rem;"></div>
      <div class="card">
        <div class="card-title" style="font-size:.85rem;">New Schedule</div>
        <div class="field-row">
          <div class="field"><label>Report Type</label><select id="sched-template"></select></div>
          <div class="field"><label>Frequency</label>
            <select id="sched-frequency"><option value="weekly">Weekly</option><option value="monthly">Monthly</option><option value="quarterly">Quarterly</option></select>
          </div>
        </div>
        <div class="field"><label>Recipient Emails (comma-separated)</label><input aria-label="alice@org.com, bob@org.com" id="sched-emails" placeholder="alice@org.com, bob@org.com"></div>
        <button type="button" class="btn btn-primary btn-sm" id="sched-create-btn">+ Add Schedule</button>
      </div>

    </div>
  </main>
</div>
<script src="/assets/js/config.js"></script>
<script src="/assets/js/i18n.js"></script>
<script src="/assets/js/app.js"></script>
<script>
  if (!requireLogin()) { /* redirected */ }
  renderShell({ role:'admin', active:'/app/report-library.html', eyebrow:'Reporting Platform', title:'Report Library' });

  const myRole = JSON.parse(localStorage.getItem('vi_user') || 'null')?.role;
  const STATUS_BADGE = { draft: 'badge-neutral', review: 'badge-warn', approved: 'badge-success', published: 'badge-success', archived: 'badge-neutral' };
  const NEXT_STATUS = { draft: 'review', review: 'approved', approved: 'published', published: 'archived' };
  const NEXT_LABEL = { draft: 'Submit for Review', review: 'Approve', approved: 'Publish', published: 'Archive' };

  async function loadReports() {
    const status = document.getElementById('status-filter').value;
    try {
      const { reports } = await apiRequest(`/api/reports${status ? '?status=' + status : ''}`);
      document.getElementById('reports-tbody').innerHTML = reports.length ? reports.map(r => {
        const canAdvance = myRole === 'org_admin' || myRole === 'super_admin' || (myRole === 'me_officer' && r.status === 'draft');
        const nextStatus = NEXT_STATUS[r.status];
        return `<tr>
          <td><a href="/app/report-viewer.html?report_id=${r.id}">${r.template_name}</a></td>
          <td>${r.campaign_name || '—'}</td>
          <td>v${r.version}</td>
          <td><span class="badge ${STATUS_BADGE[r.status]}">${r.status}</span></td>
          <td class="muted-note">${r.generated_by_name || 'System'}</td>
          <td class="muted-note">${new Date(r.updated_at + 'Z').toLocaleDateString()}</td>
          <td>
            ${nextStatus && canAdvance ? `<button type="button" class="btn btn-ghost btn-sm advance-btn" data-id="${r.id}" data-next="${nextStatus}" style="font-size:.72rem;">${NEXT_LABEL[r.status]}</button>` : ''}
            ${(myRole === 'org_admin' || myRole === 'super_admin') ? `<button type="button" class="btn btn-ghost btn-sm duplicate-btn" data-id="${r.id}" style="font-size:.72rem;">New Version</button>` : ''}
          </td>
        </tr>`;
      }).join('') : '<tr><td colspan="7" class="muted-note" style="padding:1.5rem;">No reports yet — generate one from a project.</td></tr>';

      document.querySelectorAll('.advance-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          try {
            await apiRequest(`/api/reports/${btn.dataset.id}/status`, { method: 'PUT', body: { status: btn.dataset.next } });
            loadReports();
          } catch (e) { showToast('Could not update status: ' + e.message, 'error'); }
        });
      });
      document.querySelectorAll('.duplicate-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          btn.disabled = true; btn.textContent = 'Generating…';
          try {
            const result = await apiRequest(`/api/reports/${btn.dataset.id}/duplicate`, { method: 'POST' });
            showToast(`New version (v${result.version}) created`, 'success');
            loadReports();
          } catch (e) {
            showToast('Could not create new version: ' + e.message, 'error');
            btn.disabled = false; btn.textContent = 'New Version';
          }
        });
      });
    } catch (e) {
      document.getElementById('reports-tbody').innerHTML = `<tr><td colspan="7" class="muted-note" style="color:var(--danger); padding:1.5rem;">Could not load: ${e.message}</td></tr>`;
    }
  }

  document.getElementById('status-filter').addEventListener('change', loadReports);
  loadReports();

  // ---------- Report Scheduler (Task 8.8) ----------
  async function loadSchedules() {
    try {
      const [{ schedules }, { templates }] = await Promise.all([
        apiRequest('/api/report-schedules'), apiRequest('/api/report-templates'),
      ]);
      if (!document.getElementById('sched-template').dataset.populated) {
        document.getElementById('sched-template').innerHTML = templates.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
        document.getElementById('sched-template').dataset.populated = '1';
      }
      document.getElementById('schedules-list').innerHTML = schedules.length
        ? schedules.map(s => `<div class="card" style="margin-bottom:.6rem; display:flex; justify-content:space-between; align-items:center;">
            <div><b>${s.template_name}</b> — ${s.frequency} <div class="muted-note" style="font-size:.78rem;">${s.recipient_emails} · next: ${new Date(s.next_run_at + 'Z').toLocaleDateString()}</div></div>
            <button type="button" class="btn btn-ghost btn-sm sched-delete-btn" data-id="${s.id}">Remove</button>
          </div>`).join('')
        : '<p class="muted-note">No scheduled reports yet.</p>';
      document.querySelectorAll('.sched-delete-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          await apiRequest(`/api/report-schedules/${btn.dataset.id}`, { method: 'DELETE' });
          loadSchedules();
        });
      });
    } catch (e) { document.getElementById('schedules-list').innerHTML = `<p class="muted-note" style="color:var(--danger);">${e.message}</p>`; }
  }

  document.getElementById('sched-create-btn').addEventListener('click', async () => {
    const emails = document.getElementById('sched-emails').value.trim();
    if (!emails) { showToast('Enter at least one recipient email.', 'error'); return; }
    try {
      await apiRequest('/api/report-schedules', { method: 'POST', body: {
        template_id: document.getElementById('sched-template').value,
        frequency: document.getElementById('sched-frequency').value,
        recipient_emails: emails,
      }});
      document.getElementById('sched-emails').value = '';
      showToast('Schedule created', 'success');
      loadSchedules();
    } catch (e) { showToast('Could not create schedule: ' + e.message, 'error'); }
  });

  loadSchedules();
</script>
<script src="/assets/js/admin-functional-qa.js"></script>
<script src="/assets/js/production-routing.js"></script>
</body>
</html>
