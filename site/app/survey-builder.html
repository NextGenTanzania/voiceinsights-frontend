<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/assets/img/logo-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Survey Builder — VoiceInsights Africa</title>
<link rel="stylesheet" href="/assets/css/style.css">
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div class="shell">
  <div id="sidebar-mount"></div>
  <main class="main">
    <div id="topbar-mount"></div>
    <div class="content">
      <div class="grid" style="grid-template-columns: 1fr 340px; align-items:start; gap:1.5rem;">

        <div>
          <div class="card" style="margin-bottom:1.25rem;">
            <div class="field-row">
              <div class="field"><label>Survey Name</label><input id="f-title" placeholder="e.g. Access to Finance in Agriculture — Tanzania"></div>
              <div class="field"><label>Module Type</label>
                <select id="f-module"><option>Impact Monitoring</option><option>Survey Automation</option><option>Beneficiary Feedback</option><option>Call-Based Research</option><option>Grievance</option></select>
              </div>
            </div>
            <div class="field"><label>Description</label><textarea id="f-desc" rows="2" placeholder="What is this survey trying to find out?"></textarea></div>
          </div>

          <div class="section-head"><h2 style="font-size:1.05rem;">Questions</h2><button class="btn btn-primary btn-sm" id="add-q-btn">+ Add Question</button></div>

          <div id="questions-list">
          </div>
          <p class="muted-note" id="no-questions-note">No questions yet — click "+ Add Question" to add your first one.</p>
        </div>

        <div>
          <div class="card" style="margin-bottom:1rem;">
            <div class="card-title">Survey Status</div>
            <select id="f-status" style="margin-bottom:.8rem;"><option>Draft</option><option>Active</option><option>Paused</option></select>
            <div class="muted-note" id="save-status">Not saved yet</div>
          </div>
          <div class="card" style="margin-bottom:1rem;">
            <div class="card-title">Next Steps</div>
            <a href="/app/campaigns.html" class="btn btn-ghost btn-sm" style="width:100%; justify-content:center; margin-bottom:.5rem;">Link to a Campaign</a>
            <button class="btn btn-primary" id="save-btn" style="width:100%; justify-content:center;">Save Survey</button>
          </div>
        </div>

      </div>
    </div>
  </main>
</div>
<script src="/assets/js/config.js"></script>
<script src="/assets/js/i18n.js"></script>
<script src="/assets/js/app.js"></script>
<script>
  if (!requireLogin()) { /* redirected */ }
  const params = new URLSearchParams(window.location.search);
  const editingId = params.get('id');

  renderShell({ role:'client', active:'/app/surveys.html', eyebrow:'Survey Builder', title: editingId ? 'Loading…' : 'New Survey' });

  function updateNoQuestionsNote() {
    document.getElementById('no-questions-note').style.display = document.querySelectorAll('.question-row').length ? 'none' : 'block';
  }

  function addQuestionRow(text, type) {
    const row = document.createElement('div');
    row.className = 'card question-row';
    row.style.marginBottom = '.9rem';
    row.innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:.6rem; gap:.6rem;">
        <select class="q-type" style="max-width:220px; padding:.3rem .5rem; font-size:.78rem;">
          <option value="open_voice">Voice (Open Voice)</option>
          <option value="full_name">Respondent's Full Name</option>
        </select>
        <button class="btn btn-ghost btn-sm remove-q">Remove</button>
      </div>
      <input class="q-text" placeholder="Type your question..." value="${text ? text.replace(/"/g, '&quot;') : ''}">
      <div class="muted-note q-name-note" style="margin-top:.4rem; display:none;">This answer is saved as the respondent's name (shown across Respondents, Interviews, and Reports) — it skips sentiment/fraud analysis.</div>`;
    document.getElementById('questions-list').appendChild(row);
    const typeSelect = row.querySelector('.q-type');
    if (type) typeSelect.value = type;
    const nameNote = row.querySelector('.q-name-note');
    nameNote.style.display = typeSelect.value === 'full_name' ? 'block' : 'none';
    typeSelect.addEventListener('change', () => { nameNote.style.display = typeSelect.value === 'full_name' ? 'block' : 'none'; });
    row.querySelector('.remove-q').addEventListener('click', () => { row.remove(); updateNoQuestionsNote(); });
    updateNoQuestionsNote();
  }

  document.getElementById('add-q-btn').addEventListener('click', () => addQuestionRow(''));
  updateNoQuestionsNote();

  if (editingId) {
    (async () => {
      try {
        const { survey, questions } = await apiRequest(`/api/surveys/${editingId}`);
        document.getElementById('f-title').value = survey.title;
        document.getElementById('f-desc').value = survey.description || '';
        const moduleSelect = document.getElementById('f-module');
        [...moduleSelect.options].forEach(o => { if (o.value.toLowerCase().replace(/ /g, '_') === survey.module_type) moduleSelect.value = o.value; });
        const statusSelect = document.getElementById('f-status');
        [...statusSelect.options].forEach(o => { if (o.value.toLowerCase() === survey.status) statusSelect.value = o.value; });
        questions.forEach(q => addQuestionRow(q.question_text, q.question_type));
        document.querySelector('#topbar-mount h1').textContent = survey.title;
        document.getElementById('save-status').textContent = `Editing existing survey (ID: ${survey.id})`;
      } catch (e) {
        document.getElementById('save-status').textContent = 'Could not load this survey: ' + e.message;
        document.getElementById('save-status').style.color = 'var(--danger)';
      }
    })();
  }

  document.getElementById('save-btn').addEventListener('click', async () => {
    const btn = document.getElementById('save-btn');
    const statusNote = document.getElementById('save-status');
    if (!document.getElementById('f-title').value.trim()) {
      statusNote.textContent = 'Please give the survey a name first.';
      statusNote.style.color = 'var(--danger)';
      return;
    }
    btn.disabled = true; btn.textContent = 'Saving…';
    const questions = [...document.querySelectorAll('.question-row')]
      .map(row => ({ question_text: row.querySelector('.q-text').value, question_type: row.querySelector('.q-type').value }))
      .filter(q => q.question_text);
    try {
      if (editingId) {
        await apiRequest(`/api/surveys/${editingId}`, {
          method: 'PUT',
          body: {
            title: document.getElementById('f-title').value,
            description: document.getElementById('f-desc').value,
            module_type: document.getElementById('f-module').value,
            status: document.getElementById('f-status').value.toLowerCase(),
            questions,
          },
        });
        statusNote.textContent = 'Saved ✓';
        statusNote.style.color = 'var(--success)';
      } else {
        const { survey } = await apiRequest('/api/surveys', {
          method: 'POST',
          body: {
            title: document.getElementById('f-title').value,
            description: document.getElementById('f-desc').value,
            module_type: document.getElementById('f-module').value,
            status: document.getElementById('f-status').value.toLowerCase(),
          },
        });
        for (let i = 0; i < questions.length; i++) {
          await apiRequest(`/api/surveys/${survey.id}/questions`, {
            method: 'POST',
            body: { question_text: questions[i].question_text, question_type: questions[i].question_type, order_index: i },
          });
        }
        statusNote.textContent = `Saved ✓ — redirecting…`;
        statusNote.style.color = 'var(--success)';
        setTimeout(() => { window.location.href = `/app/survey-builder.html?id=${survey.id}`; }, 800);
      }
    } catch (err) {
      statusNote.textContent = err.message.includes('Failed to fetch')
        ? 'Backend not reachable — check config.js API_BASE_URL'
        : 'Error: ' + err.message;
      statusNote.style.color = 'var(--danger)';
    } finally {
      btn.disabled = false; btn.textContent = 'Save Survey';
    }
  });
</script>
<script src="/assets/js/admin-functional-qa.js"></script>
<script src="/assets/js/production-routing-v2102.js"></script>
</body>
</html>
