<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Founder Customer Success — VoiceInsights</title><link rel="stylesheet" href="/assets/css/style.css">
<link rel="stylesheet" href="/assets/css/enterprise-dashboard-theme.css"><style>body{background:#07110f;color:white}.wrap{max-width:1100px;margin:auto;padding:24px}.hero{padding:28px;background:linear-gradient(135deg,#0a2b24,#164a3d);border-radius:22px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:20px}.card{padding:20px;background:#0d1d19;border:1px solid #24463c;border-radius:18px}.n{font-size:2rem;font-weight:900}@media(max-width:700px){.grid{grid-template-columns:1fr}}</style></head><body><main class=wrap><section class=hero><h1>Founder — Pilot & Customer Success</h1><p>Executive view of pilots, customer health, revenue forecast and risk.</p></section><section class=grid id=cards></section></main><script src="/assets/js/config.js"></script><script>async function load(){let d={};try{d=(await apiRequest('/api/customer-success/v2109a/founder-dashboard')).customer_success||{}}catch(e){};cards.innerHTML=Object.entries(d).map(([k,v])=>`<div class=card><div class=n>${typeof v==='number'?v:v||0}</div><div>${k.replaceAll('_',' ')}</div></div>`).join('')||'<div class=card>No data yet.</div>'}load()</script></body></html>
