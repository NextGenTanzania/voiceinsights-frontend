<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/assets/img/logo-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Pipeline — Admin Console</title>
<link rel="stylesheet" href="/assets/css/style.css">
<link rel="stylesheet" href="/assets/css/enterprise-dashboard-theme.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  .pipeline-board { display:flex; gap:1rem; overflow-x:auto; padding-bottom:1rem; }
  .pipeline-col { min-width:250px; flex:1; background:var(--surface-2); border-radius:12px; padding:.8rem; }
  .pipeline-col-title { font-size:.75rem; text-transform:uppercase; letter-spacing:.06em; font-weight:700; color:var(--text-muted); margin-bottom:.7rem; display:flex; justify-content:space-between; }
  .lead-card { background:var(--surface); border-radius:10px; padding:.8rem; margin-bottom:.7rem; border:1px solid var(--border); }
  .lead-card h4 { font-size:.85rem; margin:0 0 .3rem; }
  .lead-card .muted-note { font-size:.72rem; }
  .lead-card select { width:100%; margin-top:.5rem; font-size:.72rem; padding:.3rem; }
</style>
</head>
<body>
<h1 class="visually-hidden">Sales Pipeline — Admin Console</h1>
<a class="skip-link" href="#main-content">Skip to main content</a>
<div class="shell">
  <div id="sidebar-mount"></div>
  <main id="main-content" class="main">
    <div id="topbar-mount"></div>
    <div class="content">
      <p class="muted-note" style="margin-bottom:1rem;">Every "Request Demo" and "Contact Sales" submission becomes a Business Inquiry here automatically — AI-scored, and ready to become a real Organization with one click when won.</p>
      <div class="pipeline-board" id="pipeline-board">
        <div class="muted-note" style="padding:1.5rem;">Loading pipeline…</div>
      </div>
    </div>
  </main>
</div>
<script src="/assets/js/config.js"></script>
<script src="/assets/js/i18n.js"></script>
<script src="/assets/js/app.js"></script>
<script>
  if (!requireLogin()) { /* redirected */ }
  const storedUserCheck = JSON.parse(localStorage.getItem('vi_user') || 'null');
  if (storedUserCheck?.role !== 'super_admin') {
    document.body.innerHTML = '<div style="display:flex; align-items:center; justify-content:center; height:100vh; text-align:center; padding:2rem;"><div><h2>Super Admin access required</h2><p class="muted-note">You do not have permission to view this page.</p><a href="/app/dashboard.html" class="btn btn-primary" style="margin-top:1rem;">Go to Dashboard</a></div></div>';
    throw new Error('Access denied — not a Super Admin');
  }
  renderShell({ role:'admin', active:'/admin/leads.html', eyebrow:'Sales Pipeline', title:'Business Inquiries' });

  const STAGES = [
    { key: 'new', label: 'New' },
    { key: 'contacted', label: 'Contacted' },
    { key: 'proposal_sent', label: 'Proposal Sent' },
    { key: 'negotiating', label: 'Negotiating' },
    { key: 'won', label: 'Won' },
    { key: 'lost', label: 'Lost' },
  ];

  let allLeads = [];

  const PRIORITY_BADGE = { high: 'badge-danger', medium: 'badge-warn', low: 'badge-neutral' };

  function render() {
    const board = document.getElementById('pipeline-board');
    board.innerHTML = STAGES.map(stage => {
      const stageLeads = allLeads.filter(l => l.stage === stage.key);
      return `
        <div class="pipeline-col">
          <div class="pipeline-col-title"><span>${stage.label}</span><span>${stageLeads.length}</span></div>
          ${stageLeads.map(l => `
            <a href="/admin/lead-profile.html?lead_id=${l.id}" class="lead-card" style="display:block; text-decoration:none; color:inherit;">
              <h4>${l.full_name}</h4>
              <div class="muted-note">${l.organization || 'No org given'}</div>
              <div class="muted-note">${l.work_email}</div>
              ${l.score != null ? `<div style="margin-top:.4rem; display:flex; gap:.3rem; align-items:center;"><span class="badge ${PRIORITY_BADGE[l.priority] || 'badge-neutral'}" style="font-size:.62rem;">${l.score}%</span>${l.estimated_deal_usd ? `<span class="muted-note" style="font-size:.68rem;">$${l.estimated_deal_usd.toLocaleString()}</span>` : ''}</div>` : '<div class="muted-note" style="font-size:.68rem; margin-top:.4rem;">Not scored yet</div>'}
            </a>`).join('') || '<p class="muted-note" style="font-size:.72rem;">Empty</p>'}
        </div>`;
    }).join('');
  }

  (async () => {
    try {
      const { leads } = await apiRequest('/api/leads');
      allLeads = leads;
      render();
    } catch (e) {
      document.getElementById('pipeline-board').innerHTML = `<p class="muted-note" style="padding:1.5rem; color:var(--danger);">Could not load: ${e.message}</p>`;
    }
  })();
</script>
<script src="/assets/js/admin-functional-qa.js"></script>
<script src="/assets/js/admin-button-qa.js"></script>
<script src="/assets/js/production-routing.js"></script>
</body>
</html>
