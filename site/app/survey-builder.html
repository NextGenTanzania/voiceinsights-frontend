<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/assets/img/logo-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Survey Builder — VoiceInsights Africa</title>
<link rel="stylesheet" href="/assets/css/style.css">
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div class="shell">
  <div id="sidebar-mount"></div>
  <main class="main">
    <div id="topbar-mount"></div>
    <div class="content">
      <div class="grid" style="grid-template-columns: 1fr 340px; align-items:start; gap:1.5rem;">

        <div>
          <div class="card" style="margin-bottom:1.25rem;">
            <div class="field-row">
              <div class="field"><label>Survey Name</label><input id="f-title" value="Baseline — Morogoro Region Agriculture"></div>
              <div class="field"><label>Module Type</label>
                <select id="f-module"><option>Impact Monitoring</option><option>Survey Automation</option><option>Beneficiary Feedback</option><option>Call-Based Research</option><option>Grievance</option></select>
              </div>
            </div>
            <div class="field"><label>Description</label><textarea id="f-desc" rows="2">Measuring farmers' baseline status before the fertilizer subsidy project.</textarea></div>
          </div>

          <div class="section-head"><h2 style="font-size:1.05rem;">Questions</h2><button class="btn btn-primary btn-sm" id="add-q-btn">+ Add Question</button></div>

          <div id="questions-list">
            <div class="card question-row" style="margin-bottom:.9rem;">
              <div style="display:flex; justify-content:space-between; margin-bottom:.6rem;">
                <span class="badge badge-accent">Question 1 · Voice (Open Voice)</span>
                <button class="btn btn-ghost btn-sm remove-q">Remove</button>
              </div>
              <input class="q-text" value="How has your harvest this season compared to last season?">
              <div class="muted-note" style="margin-top:.5rem;">Indicator (KPI tag): <b style="color:var(--text-muted)">yield_change</b></div>
            </div>

            <div class="card question-row" style="margin-bottom:.9rem;">
              <div style="display:flex; justify-content:space-between; margin-bottom:.6rem;">
                <span class="badge badge-neutral">Question 2 · Scale (1-5)</span>
                <button class="btn btn-ghost btn-sm remove-q">Remove</button>
              </div>
              <input class="q-text" value="On a scale of 1-5, how confident are you about next season's harvest?">
            </div>

            <div class="card question-row">
              <div style="display:flex; justify-content:space-between; margin-bottom:.6rem;">
                <span class="badge badge-neutral">Question 3 · Yes/No</span>
                <button class="btn btn-ghost btn-sm remove-q">Remove</button>
              </div>
              <input class="q-text" value="Did you receive subsidized fertilizer this season?">
            </div>
          </div>
        </div>

        <div>
          <div class="card" style="margin-bottom:1rem;">
            <div class="card-title">Survey Status</div>
            <select id="f-status" style="margin-bottom:.8rem;"><option>Draft</option><option>Active</option><option>Paused</option></select>
            <div class="muted-note" id="save-status">Not saved yet</div>
          </div>
          <div class="card" style="margin-bottom:1rem;">
            <div class="card-title">Next Steps</div>
            <a href="/app/campaigns.html" class="btn btn-ghost btn-sm" style="width:100%; justify-content:center; margin-bottom:.5rem;">Link to a Campaign</a>
            <button class="btn btn-primary" id="save-btn" style="width:100%; justify-content:center;">Save Survey</button>
          </div>
        </div>

      </div>
    </div>
  </main>
</div>
<script src="/assets/js/config.js"></script>
<script src="/assets/js/i18n.js"></script>
<script src="/assets/js/app.js"></script>
<script>
  if (!requireLogin()) { /* redirected */ }
  renderShell({ role:'client', active:'/app/surveys.html', eyebrow:'Survey Builder', title:'Baseline — Morogoro Region Agriculture' });

  document.getElementById('add-q-btn').addEventListener('click', () => {
    const row = document.createElement('div');
    row.className = 'card question-row';
    row.style.marginBottom = '.9rem';
    row.innerHTML = `
      <div style="display:flex; justify-content:space-between; margin-bottom:.6rem;">
        <span class="badge badge-neutral">New Question · Voice (Open Voice)</span>
        <button class="btn btn-ghost btn-sm remove-q">Remove</button>
      </div>
      <input class="q-text" placeholder="Type your question...">`;
    document.getElementById('questions-list').appendChild(row);
    row.querySelector('.remove-q').addEventListener('click', () => row.remove());
  });
  document.querySelectorAll('.remove-q').forEach(b => b.addEventListener('click', (e) => e.target.closest('.question-row').remove()));

  document.getElementById('save-btn').addEventListener('click', async () => {
    const btn = document.getElementById('save-btn');
    const statusNote = document.getElementById('save-status');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      const { survey } = await apiRequest('/api/surveys', {
        method: 'POST',
        body: {
          title: document.getElementById('f-title').value,
          description: document.getElementById('f-desc').value,
          module_type: document.getElementById('f-module').value,
          status: document.getElementById('f-status').value.toLowerCase(),
        },
      });
      const questionTexts = [...document.querySelectorAll('.q-text')].map(i => i.value).filter(Boolean);
      for (let i = 0; i < questionTexts.length; i++) {
        await apiRequest(`/api/surveys/${survey.id}/questions`, {
          method: 'POST',
          body: { question_text: questionTexts[i], order_index: i },
        });
      }
      statusNote.textContent = `Saved ✓ (survey ID: ${survey.id})`;
      statusNote.style.color = 'var(--success)';
    } catch (err) {
      statusNote.textContent = err.message.includes('Failed to fetch')
        ? 'Backend not reachable — check config.js API_BASE_URL'
        : 'Error: ' + err.message;
      statusNote.style.color = 'var(--danger)';
    } finally {
      btn.disabled = false; btn.textContent = 'Save Survey';
    }
  });
</script>
</body>
</html>
