<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Customer Success Workspace — VoiceInsights</title><link rel="stylesheet" href="/assets/css/style.css"><style>body{background:#f4f8f6}.wrap{max-width:1200px;margin:auto;padding:24px}.hero{background:#0b2a22;color:white;padding:28px;border-radius:22px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:20px}.card{background:white;border:1px solid #dfe9e5;border-radius:18px;padding:18px}.score{font-size:2.2rem;font-weight:900;color:#0b6e4f}.org{display:grid;grid-template-columns:2fr repeat(4,1fr);gap:10px;align-items:center}@media(max-width:800px){.grid{grid-template-columns:1fr}.org{grid-template-columns:1fr 1fr}}</style></head><body><main class=wrap><section class=hero><p>Customer Success Core</p><h1>Organization Health & Adoption</h1><p>See adoption, training, support risk, delivery performance and renewal probability in one workspace.</p></section><section class=grid id=summary></section><section class=card style="margin-top:20px"><h2>Organizations</h2><div id=orgs></div></section></main><script src="/assets/js/config.js"></script><script>async function load(){let d;try{d=await apiRequest('/api/customer-success/v2109a/workspace')}catch(e){d={summary:{healthy:0,at_risk:0,average_health:0},organizations:[]}};summary.innerHTML=Object.entries(d.summary||{}).map(([k,v])=>`<div class=card><div class=score>${v}${k==='average_health'?'/100':''}</div><div>${k.replaceAll('_',' ')}</div></div>`).join('');orgs.innerHTML=(d.organizations||[]).map(o=>`<div class="org card"><strong>${o.organization_name}</strong><span>Health ${o.health?.score||0}/100</span><span>Risk ${o.health?.risk||'—'}</span><span>Adoption ${o.adoption_score||0}%</span><span>Renewal ${o.health?.renewal_probability||0}%</span></div>`).join('')||'<p>No organization health records yet.</p>'}load()</script></body></html>
