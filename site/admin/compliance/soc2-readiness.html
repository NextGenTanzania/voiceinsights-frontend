<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><script src="/assets/js/config.js"></script><title>SOC 2 Readiness — VoiceInsights</title><style>body{font-family:Inter,system-ui,sans-serif;margin:0;background:#07110f;color:#ecfdf5}.shell{max-width:1180px;margin:auto;padding:28px}.hero{background:linear-gradient(135deg,#0f3d32,#0b6e4f);padding:28px;border-radius:20px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:16px;margin-top:20px}.card{background:#10201c;border:1px solid #25443b;border-radius:16px;padding:18px}.kpi{font-size:2rem;font-weight:800;color:#f4d35e}.btn{display:inline-block;padding:10px 14px;border-radius:10px;background:#d4af37;color:#07110f;font-weight:800;text-decoration:none;border:0;cursor:pointer}.muted{color:#a7c4ba}.bar{height:10px;background:#203a33;border-radius:99px;overflow:hidden}.bar span{display:block;height:100%;background:#34d399}</style></head><body>
<a class="skip-link" href="#main-content">Skip to main content</a><main id="main-content" class="shell"><section class="hero"><p>Readiness, not certification</p><h1>SOC 2 Readiness & Evidence Center</h1><p class="muted">Track Security, Availability, Confidentiality, Processing Integrity and Privacy controls.</p></section><div id="content" class="grid"></div></main><script>const api=window.VI_API_BASE||"https://voiceinsights-api.kitentyatsnp.workers.dev";const token=localStorage.getItem("vi_token");async function get(p,o={}){const r=await fetch(api+p,{...o,headers:{"Content-Type":"application/json",...(token?{Authorization:`Bearer ${token}`}:{}) ,...(o.headers||{})}});const j=await r.json().catch(()=>({}));if(!r.ok)throw new Error(j.error||`HTTP ${r.status}`);return j}</script><script>get('/api/compliance/trust/soc2-readiness').then(x=>{const s=x.soc2;content.innerHTML=`<div class="card"><div class="kpi">${s.overall_score}%</div><p>${s.certification_note}</p></div>`+s.domains.map(d=>`<div class="card"><h3>${d.label}</h3><div class="kpi">${d.score}%</div><p>${d.evidence_count} evidence items · ${d.missing_controls} gaps</p></div>`).join('')}).catch(e=>content.innerHTML=`<div class="card">${e.message}</div>`)</script></body></html>
