<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SSO — VoiceInsights</title><link rel="stylesheet" href="/assets/css/identity-access.css"><script src="/assets/js/config.js"></script></head><body style="margin:0;background:#f4f7f6;font-family:Arial,sans-serif">
<a class="skip-link" href="#main-content">Skip to main content</a><main id="main-content" class="iam-page"><section class="iam-hero"><p>Enterprise Login</p><h1>Single Sign-On</h1><span>Microsoft Entra, Google Workspace, Okta, Auth0 and OpenID Connect.</span></section><form class="iam-panel" id="form"><label>Provider</label><select name="provider"><option value="microsoft_entra">Microsoft Entra ID</option><option value="google_workspace">Google Workspace</option><option value="okta">Okta</option><option value="auth0">Auth0</option><option value="oidc">Generic OIDC</option></select><br><label>Issuer URL</label><input aria-label="issuer url" name="issuer_url" required><br><label>Client ID</label><input aria-label="client id" name="client_id" required><br><label>Redirect URI</label><input aria-label="redirect uri" name="redirect_uri" value="https://voiceinsightsafrica.com/login.html" required><br><button class="iam-button">Save draft</button><pre id="out"></pre></form></main><script src="/assets/js/identity-access.js"></script><script>form.onsubmit=async e=>{e.preventDefault();try{const body=Object.fromEntries(new FormData(form));const d=await V2103AIam.api('/api/security/v2103a/sso/configure',{method:'POST',body:JSON.stringify(body)});out.textContent='Saved: '+d.id;}catch(e){out.textContent=e.message}}</script></body></html>
