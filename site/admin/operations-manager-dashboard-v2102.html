<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Operations Dashboard — VoiceInsights Africa</title><link rel="stylesheet" href="/assets/css/style.css"></head><body><main class="pub-section"><h1>Operations Dashboard</h1><p>Daily delivery pipeline and Founder approval control.</p><div id="cards" class="grid grid-3"></div><button class="btn btn-primary" id="submit">Submit for Founder Approval</button></main><script src="/assets/js/config.js"></script><script src="/assets/js/production-routing-v2102.js"></script><script>async function load(){try{const d=await viApi('/api/production-finalization-v2102/dashboard/operations');cards.innerHTML=Object.entries(d.cards).map(([k,v])=>`<div class="card"><h3>${k.replaceAll('_',' ')}</h3><strong>${v}</strong></div>`).join('')}catch(e){cards.innerHTML=`<p>${e.message}</p>`}}submit.onclick=async()=>{const organization_name=prompt('Organization name');const project_name=prompt('Project name');if(!organization_name||!project_name)return;try{await viApi('/api/production-finalization-v2102/approvals/submit',{method:'POST',body:JSON.stringify({organization_name,project_name})});viToast('Sent to Founder for approval');load()}catch(e){viToast(e.message,'error')}};load();</script></body></html>
