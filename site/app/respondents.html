<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/assets/img/logo-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Respondents — VoiceInsights Africa</title>
<link rel="stylesheet" href="/assets/css/style.css">
<link rel="stylesheet" href="/assets/css/enterprise-dashboard-theme.css">
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div class="shell">
  <div id="sidebar-mount"></div>
  <main class="main">
    <div id="topbar-mount"></div>
    <div class="content">
      <div class="section-head">
        <div></div>
        <select id="project-select" style="padding:.5rem .8rem; font-size:.82rem; max-width:240px;">
          <option value="">All Projects (combined)</option>
        </select>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th data-i18n="resp.name">Name</th><th data-i18n="resp.phone">Phone</th><th data-i18n="resp.region">Region</th><th data-i18n="resp.gender">Gender</th>
            <th data-i18n="resp.age_band">Age Band</th><th data-i18n="resp.consent">Consent</th><th data-i18n="resp.responses">Responses</th><th data-i18n="resp.first_seen">First Seen</th>
          </tr></thead>
          <tbody id="resp-tbody">
            <tr><td><div class="skeleton skeleton-text" style="width:60%;"></div></td><td><div class="skeleton skeleton-text" style="width:70%;"></div></td><td><div class="skeleton skeleton-text" style="width:50%;"></div></td><td><div class="skeleton skeleton-text" style="width:40%;"></div></td><td><div class="skeleton skeleton-text" style="width:45%;"></div></td><td><div class="skeleton skeleton-text" style="width:55%;"></div></td><td><div class="skeleton skeleton-text" style="width:35%;"></div></td><td><div class="skeleton skeleton-text" style="width:45%;"></div></td></tr>
            <tr><td><div class="skeleton skeleton-text" style="width:55%;"></div></td><td><div class="skeleton skeleton-text" style="width:65%;"></div></td><td><div class="skeleton skeleton-text" style="width:55%;"></div></td><td><div class="skeleton skeleton-text" style="width:35%;"></div></td><td><div class="skeleton skeleton-text" style="width:50%;"></div></td><td><div class="skeleton skeleton-text" style="width:60%;"></div></td><td><div class="skeleton skeleton-text" style="width:40%;"></div></td><td><div class="skeleton skeleton-text" style="width:50%;"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>
<script src="/assets/js/config.js"></script>
<script src="/assets/js/i18n.js"></script>
<script src="/assets/js/app.js"></script>
<script>
  if (!requireLogin()) { /* redirected */ }
  renderShell({ role:'client', active:'/app/respondents.html', eyebrow:'Participants', title:'Respondents' });
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.getAttribute('data-i18n'), el.textContent); });

  const projectSelect = document.getElementById('project-select');
  const urlCampaignId = new URLSearchParams(window.location.search).get('campaign_id') || '';
  projectSelect.addEventListener('change', (e) => {
    const url = new URL(window.location.href);
    if (e.target.value) url.searchParams.set('campaign_id', e.target.value);
    else url.searchParams.delete('campaign_id');
    window.location.href = url.toString();
  });
  apiRequest(`/api/campaigns${new URLSearchParams(window.location.search).get('org_id') ? '?org_id=' + new URLSearchParams(window.location.search).get('org_id') : ''}`).then(({ campaigns }) => {
    projectSelect.innerHTML = '<option value="">All Projects (combined)</option>' +
      campaigns.map(c => `<option value="${c.id}" ${c.id === urlCampaignId ? 'selected' : ''}>${c.name}</option>`).join('');
  }).catch(() => {});

  (async () => {
    const tbody = document.getElementById('resp-tbody');
    try {
      const qs = new URLSearchParams(window.location.search);
      const forwardParams = new URLSearchParams();
      if (qs.get('org_id')) forwardParams.set('org_id', qs.get('org_id'));
      if (urlCampaignId) forwardParams.set('campaign_id', urlCampaignId);
      const { respondents } = await apiRequest(`/api/respondents${forwardParams.toString() ? '?' + forwardParams.toString() : ''}`);
      if (!respondents.length) {
        tbody.innerHTML = `<tr><td colspan="8" class="muted-note" style="padding:1.5rem;">${t('resp.empty', "No respondents yet — they'll appear here as soon as someone answers a survey on any channel.")}</td></tr>`;
        return;
      }
      tbody.innerHTML = respondents.map(r => `
        <tr>
          <td>${r.full_name || '<span class="muted-note">—</span>'}</td>
          <td>${r.phone_number || '<span class="muted-note">' + t('resp.anonymous_web', 'Anonymous (web)') + '</span>'}</td>
          <td>${r.region || '—'}</td>
          <td>${r.gender || '—'}</td>
          <td>${r.age_bracket || '—'}</td>
          <td>${r.consent_given ? '<span class="badge badge-success">' + t('resp.given', 'Given') + '</span>' : '<span class="badge badge-neutral">—</span>'}</td>
          <td>${r.response_count}</td>
          <td>${new Date(r.created_at + 'Z').toLocaleDateString()}</td>
        </tr>`).join('');
    } catch (e) {
      tbody.innerHTML = `<tr><td colspan="8" class="muted-note" style="padding:1.5rem; color:var(--danger);">${t('resp.error', 'Could not load:')} ${e.message}</td></tr>`;
    }
  })();
</script>
<script src="/assets/js/admin-functional-qa.js"></script>
<script src="/assets/js/production-routing-v2102.js"></script>
</body>
</html>
