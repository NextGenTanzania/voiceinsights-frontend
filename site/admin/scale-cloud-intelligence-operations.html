<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Scale & Cloud Intelligence Operations | VoiceInsights Africa</title><link rel="stylesheet" href="/assets/css/style.css">
<link rel="stylesheet" href="/assets/css/enterprise-dashboard-theme.css"><style>body{background:#07131f;color:#eef6ff}.shell{max-width:1200px;margin:auto;padding:28px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px}.card{background:#102435;border:1px solid #25445b;border-radius:16px;padding:18px}.kpi{font-size:2rem;font-weight:800}.muted{color:#a9bfd0}.bar{height:9px;background:#20394b;border-radius:10px;overflow:hidden}.bar i{display:block;height:100%;background:#60d6b0}.badge{display:inline-block;padding:5px 10px;border-radius:999px;background:#173c4d;margin:3px}.error{color:#ffb4b4}</style></head><body><main class="shell"><p class="muted">VoiceInsights Africa</p><h1>Scale, Cloud Intelligence & Customer Success Operations</h1><p class="muted">Verified operational readiness across production queues, cloud intelligence, customer lifecycle and VIN™.</p><div id="status" class="card">Loading operational workspace…</div><section id="content"></section></main><script src="/assets/js/config.js"></script><script>
const api=(window.VIA_CONFIG&&VIA_CONFIG.API_BASE)||'https://voiceinsights-api.kitentyatsnp.workers.dev';
const token=()=>localStorage.getItem('via_token')||localStorage.getItem('token')||'';
async function load(){try{const r=await fetch(api+'/api/scale-intelligence/workspace',{headers:{Authorization:'Bearer '+token()}});const d=await r.json();if(!r.ok)throw new Error(d.error||'Unable to load');const w=d.workspace;document.getElementById('status').innerHTML=`<div class="grid"><div><div class="muted">Verified readiness</div><div class="kpi">${w.readiness.verified_readiness_pct}%</div></div><div><div class="muted">Status</div><h3>${w.readiness.status.replaceAll('_',' ')}</h3></div><div><div class="muted">Operational evidence</div><div class="kpi">${w.readiness.operational_evidence_pct}%</div></div></div>`;document.getElementById('content').innerHTML=`<h2>Production queues</h2><div class="grid">${w.workload.queues.map(q=>`<div class="card"><h3>${q.type.replaceAll('_',' ')}</h3><div class="kpi">${q.depth}</div><div class="muted">queued · ${q.utilization_pct}% utilization</div><div class="bar"><i style="width:${q.utilization_pct}%"></i></div><p>${q.action}</p></div>`).join('')}</div><h2>Cloud intelligence modules</h2><div class="card">${w.cloud_modules.map(x=>`<span class="badge">${x}</span>`).join('')}</div><h2>Acceptance evidence</h2><div class="grid">${Object.entries(w.readiness.evidence).map(([k,v])=>`<div class="card"><h3>${k.replaceAll('_',' ')}</h3><strong>${v?'PASS':'NOT VERIFIED'}</strong></div>`).join('')}</div>`}catch(e){document.getElementById('status').innerHTML='<span class="error">'+e.message+'</span>'}}load();
</script></body></html>
