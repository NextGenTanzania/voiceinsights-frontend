<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/assets/img/logo-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault Health — Admin Console</title>
<link rel="stylesheet" href="/assets/css/style.css">
<link rel="stylesheet" href="/assets/css/enterprise-dashboard-theme.css">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="shell">
  <div id="sidebar-mount"></div>
  <main class="main">
    <div id="topbar-mount"></div>
    <div class="content">

      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; flex-wrap:wrap; gap:.8rem;">
        <div id="vh-status-banner" class="card" style="flex:1; min-width:260px; text-align:center; padding:1rem;">
          <span style="font-size:1.6rem;" id="vh-status-icon">⏳</span>
          <div style="font-weight:700; font-size:1.1rem;" id="vh-status-text">Loading…</div>
          <div class="muted-note" id="vh-generated-at" style="font-size:.72rem;"></div>
        </div>
        <div style="display:flex; gap:.6rem;">
          <button class="btn btn-ghost btn-sm" id="vh-refresh-btn">↻ Refresh</button>
          <button class="btn btn-ghost btn-sm" id="vh-export-btn">⬇ Export Health Report</button>
          <button class="btn btn-primary btn-sm" id="vh-rotate-btn">🔄 Start Key Rotation</button>
        </div>
      </div>

      <div class="grid grid-3" style="margin-bottom:1.5rem; gap:1rem;">
        <div class="card" style="text-align:center;"><div class="card-title">Total Active Secrets</div><div class="stat-value" id="vh-total-secrets">–</div></div>
        <div class="card" style="text-align:center;"><div class="card-title">Failed Decryptions (24h)</div><div class="stat-value" id="vh-failed-24h" style="color:var(--danger);">–</div></div>
        <div class="card" style="text-align:center;"><div class="card-title">Active Rotation Job</div><div class="stat-value" id="vh-active-job" style="font-size:1.1rem;">None</div></div>
      </div>

      <div class="grid grid-2" style="gap:1.5rem; align-items:flex-start; margin-bottom:1.5rem;">
        <div class="card">
          <div class="card-title">Secret Distribution</div>
          <div style="position:relative; height:220px;"><canvas id="vh-distribution-chart"></canvas></div>
        </div>
        <div class="card">
          <div class="card-title">Rotation Progress</div>
          <div id="vh-rotation-progress"><p class="muted-note">No rotation job has run yet.</p></div>
        </div>
      </div>

      <div class="section-head">
        <h2 style="font-size:1.05rem;">Failures by Secret Type (24h)</h2>
        <input type="text" id="vh-failures-search" placeholder="Filter by secret type or error code…" style="max-width:260px;">
      </div>
      <div class="table-wrap" style="margin-bottom:1.5rem;">
        <table>
          <thead><tr><th>Secret Type</th><th>Error Code</th><th>Count</th></tr></thead>
          <tbody id="vh-failures-tbody"><tr><td colspan="3" class="muted-note" style="padding:1.5rem;">Loading…</td></tr></tbody>
        </table>
      </div>

      <div class="section-head">
        <h2 style="font-size:1.05rem;">Recent Rotation Jobs</h2>
        <select id="vh-jobs-filter" style="max-width:180px;">
          <option value="">All statuses</option>
          <option value="running">Running</option>
          <option value="complete">Complete</option>
          <option value="failed">Failed</option>
        </select>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Job</th><th>Version</th><th>Progress</th><th>Failed</th><th>Status</th><th>Started</th></tr></thead>
          <tbody id="vh-jobs-tbody"><tr><td colspan="6" class="muted-note" style="padding:1.5rem;">Loading…</td></tr></tbody>
        </table>
      </div>

    </div>
  </main>
</div>
<script src="/assets/js/config.js"></script>
<script src="/assets/js/i18n.js"></script>
<script src="/assets/js/app.js"></script>
<script>
  if (!requireLogin()) { /* redirected */ }
  const storedUserCheck = JSON.parse(localStorage.getItem('vi_user') || 'null');
  if (storedUserCheck?.role !== 'super_admin') {
    document.body.innerHTML = '<div style="display:flex; align-items:center; justify-content:center; height:100vh; text-align:center; padding:2rem;"><div><h2>Super Admin access required</h2></div></div>';
    throw new Error('Access denied — not a Super Admin');
  }
  renderShell({ role:'admin', active:'/admin/vault-health.html', eyebrow:'Platform Security', title:'Vault Health' });

  const STATUS_META = {
    healthy:  { icon: '✅', text: 'All Systems Healthy', color: 'var(--success)' },
    degraded: { icon: '⚠️', text: 'Degraded — Some Failures Detected', color: 'var(--warn)' },
    critical: { icon: '🔴', text: 'Critical — Multiple Decryption Failures', color: 'var(--danger)' },
  };
  const JOB_BADGE = { running: 'badge-warn', complete: 'badge-success', failed: 'badge-danger' };
  let lastHealthData = null;
  let distributionChartInstance = null;

  async function loadHealth() {
    try {
      const data = await apiRequest('/api/superadmin/vault-health');
      lastHealthData = data;

      const meta = STATUS_META[data.overall_status] || STATUS_META.degraded;
      document.getElementById('vh-status-icon').textContent = meta.icon;
      document.getElementById('vh-status-text').textContent = meta.text;
      document.getElementById('vh-status-text').style.color = meta.color;
      document.getElementById('vh-generated-at').textContent = 'Last checked: ' + new Date(data.generated_at).toLocaleString();

      document.getElementById('vh-total-secrets').textContent = data.total_active_secrets;
      document.getElementById('vh-failed-24h').textContent = data.failed_decryptions_24h;

      const runningJob = data.recent_rotation_jobs.find(j => j.status === 'running');
      document.getElementById('vh-active-job').textContent = runningJob ? `${runningJob.rotated_count}/${runningJob.total_secrets} rotated` : 'None';

      renderFailuresTable(data.failures_by_type);
      renderJobsTable(data.recent_rotation_jobs);
      renderDistributionChart(data.secret_distribution);
      renderRotationProgress(runningJob);
    } catch (e) {
      document.getElementById('vh-status-text').textContent = 'Could not load Vault Health: ' + e.message;
      document.getElementById('vh-status-text').style.color = 'var(--danger)';
    }
  }

  function renderFailuresTable(failures) {
    const searchTerm = (document.getElementById('vh-failures-search').value || '').toLowerCase();
    const filtered = failures.filter(f => !searchTerm || f.secret_type?.toLowerCase().includes(searchTerm) || f.error_code?.toLowerCase().includes(searchTerm));
    document.getElementById('vh-failures-tbody').innerHTML = filtered.length
      ? filtered.map(f => `<tr><td>${f.secret_type || '—'}</td><td>${f.error_code || '—'}</td><td>${f.n}</td></tr>`).join('')
      : '<tr><td colspan="3" class="muted-note" style="padding:1.5rem;">No failures in the last 24 hours. 🎉</td></tr>';
  }

  function renderJobsTable(jobs) {
    const statusFilter = document.getElementById('vh-jobs-filter').value;
    const filtered = statusFilter ? jobs.filter(j => j.status === statusFilter) : jobs;
    document.getElementById('vh-jobs-tbody').innerHTML = filtered.length
      ? filtered.map(j => {
          const pct = j.total_secrets ? Math.round(((j.rotated_count + j.failed_count) / j.total_secrets) * 100) : 100;
          return `<tr>
            <td style="font-family:var(--font-mono); font-size:.78rem;">${j.id}</td>
            <td>v${j.from_version} → v${j.to_version}</td>
            <td><div class="progress" style="width:100px; display:inline-block; vertical-align:middle;"><span style="width:${pct}%"></span></div> ${pct}%</td>
            <td>${j.failed_count}</td>
            <td><span class="badge ${JOB_BADGE[j.status] || 'badge-neutral'}">${j.status}</span></td>
            <td class="muted-note">${new Date(j.started_at + 'Z').toLocaleString()}</td>
          </tr>`;
        }).join('')
      : '<tr><td colspan="6" class="muted-note" style="padding:1.5rem;">No rotation jobs recorded yet.</td></tr>';
  }

  function renderDistributionChart(distribution) {
    if (distributionChartInstance) distributionChartInstance.destroy();
    if (!distribution.length) return;
    distributionChartInstance = new Chart(document.getElementById('vh-distribution-chart'), {
      type: 'doughnut',
      data: {
        labels: distribution.map(d => d.secret_type),
        datasets: [{ data: distribution.map(d => d.n), backgroundColor: ['#E4A23A', '#4FA490', '#D9634A', '#9FB3AB', '#E4C23A', '#6FBF8B'] }],
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#9FB3AB', font: { size: 11 } } } } },
    });
  }

  function renderRotationProgress(runningJob) {
    const el = document.getElementById('vh-rotation-progress');
    if (!runningJob) {
      el.innerHTML = '<p class="muted-note">No rotation job is currently running.</p>';
      return;
    }
    const pct = runningJob.total_secrets ? Math.round(((runningJob.rotated_count + runningJob.failed_count) / runningJob.total_secrets) * 100) : 0;
    el.innerHTML = `
      <div style="font-size:.85rem; margin-bottom:.5rem;">Rotating v${runningJob.from_version} → v${runningJob.to_version} — processed in small batches every 5 minutes via Cron Trigger.</div>
      <div class="progress" style="margin-bottom:.5rem;"><span style="width:${pct}%; background:var(--accent);"></span></div>
      <div class="muted-note" style="font-size:.78rem;">${runningJob.rotated_count + runningJob.failed_count} / ${runningJob.total_secrets} processed (${runningJob.failed_count} failed)</div>`;
  }

  document.getElementById('vh-refresh-btn').addEventListener('click', loadHealth);
  document.getElementById('vh-failures-search').addEventListener('input', () => lastHealthData && renderFailuresTable(lastHealthData.failures_by_type));
  document.getElementById('vh-jobs-filter').addEventListener('change', () => lastHealthData && renderJobsTable(lastHealthData.recent_rotation_jobs));

  document.getElementById('vh-export-btn').addEventListener('click', () => {
    if (!lastHealthData) return;
    const blob = new Blob([JSON.stringify(lastHealthData, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `vault-health-report-${new Date().toISOString().slice(0, 10)}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  });

  document.getElementById('vh-rotate-btn').addEventListener('click', async () => {
    if (!confirm('Start a key rotation? This re-encrypts every active secret under the current key version, in small batches over the next few minutes.')) return;
    const btn = document.getElementById('vh-rotate-btn');
    btn.disabled = true; btn.textContent = 'Starting…';
    try {
      const result = await apiRequest('/api/superadmin/vault/rotate', { method: 'POST', body: {} });
      showToast(result.message || 'Rotation started', 'success');
      loadHealth();
    } catch (e) {
      showToast('Could not start rotation: ' + e.message, 'error');
    } finally {
      btn.disabled = false; btn.textContent = '🔄 Start Key Rotation';
    }
  });

  loadHealth();
  setInterval(loadHealth, 30000); // auto-refresh every 30s so an in-progress rotation visibly advances
</script>
<script src="/assets/js/admin-functional-qa.js"></script>
<script src="/assets/js/admin-button-qa.js"></script>
<script src="/assets/js/production-routing-v2102.js"></script>
</body>
</html>
