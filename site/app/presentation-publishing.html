<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Presentation & Publishing — VoiceInsights Africa</title><link rel="stylesheet" href="/assets/css/style.css">
<link rel="stylesheet" href="/assets/css/enterprise-dashboard-theme.css"><style>
body{background:#07111f;color:#e9f2ff;font-family:Inter,Arial,sans-serif}.wrap{max-width:1280px;margin:auto;padding:28px}.hero{padding:30px;border-radius:24px;background:linear-gradient(135deg,#0b3a67,#4b2e83 55%,#9b1c1c);box-shadow:0 20px 60px #0005}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-top:20px}.card{background:#101d2e;border:1px solid #29405e;border-radius:18px;padding:18px}.controls{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:20px 0}select,textarea,button{width:100%;box-sizing:border-box;border-radius:12px;border:1px solid #3a5578;padding:12px;background:#0b1728;color:#fff}textarea{min-height:260px;font-family:ui-monospace,monospace}button{background:#1e6fa8;font-weight:800;cursor:pointer}button.gold{background:#a17a20}.status{padding:12px;border-radius:12px;background:#0d2037;margin-top:12px;white-space:pre-wrap}.pill{display:inline-block;margin:3px;padding:5px 9px;border-radius:999px;background:#213b5d}.preview{border-left:6px solid #d6a93b}.small{color:#aabbd1;font-size:.9rem}@media(max-width:700px){.controls{grid-template-columns:1fr}.wrap{padding:14px}}</style></head><body>
<a class="skip-link" href="#main-content">Skip to main content</a><main id="main-content" class="wrap"><section class="hero"><p>VoiceInsights Flagship Report Engine™ v2</p><h1>Presentation & Publishing</h1><p>One governed report model. Premium PDF, editable Word, native PowerPoint, statistical Excel, Cabinet Memo, Policy Brief, Board Deck and Investor Deck.</p></section><div class="controls"><select id="profile"><option value="un">UN Publication</option><option value="world_bank">World Bank Publication</option><option value="government">Government Publication</option><option value="donor">Donor Publication</option><option value="board">Board Publication</option><option value="corporate">Corporate Publication</option><option value="research">Research Publication</option></select><select id="product"><option value="premium_pdf">Premium PDF</option><option value="editable_word">Editable Word</option><option value="executive_powerpoint">Executive PowerPoint</option><option value="statistical_excel">Statistical Excel</option><option value="cabinet_memo">Cabinet Memo</option><option value="policy_brief">Policy Brief</option><option value="board_deck">Board Deck</option><option value="investor_deck">Investor Deck</option><option value="interactive_html">Interactive HTML</option></select></div><textarea id="report">{"title":"National Youth Employment & Livelihood Intelligence Report","organization_name":"VoiceInsights Africa Demonstration","executive_summary":"A governed executive summary is required.","findings":[{"text":"Finding supported by evidence","evidence_ids":["E1"]}],"evidence":[{"id":"E1","source":"Survey Q1","confidence_score":92}],"recommendations":[{"recommendation":"Prioritise a targeted response","owner":"Programme Lead","timeline":"0–90 days"}],"methodology":{"sample_design":"Stratified sample","sample_size":1200},"limitations":["Demonstration content only"],"accessibility":true,"brand_compliance":true}</textarea><div class="controls"><button type="button" onclick="compose()">Compose Publication</button><button type="button" class="gold" onclick="quality()">Run Quality Gate</button></div><div class="controls"><button type="button" onclick="downloadProduct()">Generate & Download</button><button type="button" onclick="loadCatalog()">View Catalogue</button></div><div id="status" class="status">Ready.</div><div id="cards" class="grid"></div><pre id="out" class="card preview"></pre></main><script src="/assets/js/config.js"></script><script src="/assets/js/app.js"></script><script>
const api=window.VI_API_BASE||'https://voiceinsights-api.kitentyatsnp.workers.dev';const token=()=>localStorage.getItem('vi_token')||'';const data=()=>({profile:profile.value,product:product.value,report:JSON.parse(report.value),report_id:'flagship-publication'});async function call(path,opts={}){const r=await fetch(api+path,{...opts,headers:{'Content-Type':'application/json','Authorization':'Bearer '+token(),...(opts.headers||{})}});if(!r.ok)throw new Error(await r.text());return r.json()}async function compose(){try{status.textContent='Composing…';const x=await call('/api/reports/flagship/publishing/compose',{method:'POST',body:JSON.stringify(data())});out.textContent=JSON.stringify(x.publication,null,2);status.textContent='Publication composed.'}catch(e){status.textContent=e.message}}async function quality(){try{const x=await call('/api/reports/flagship/publishing/quality-gate',{method:'POST',body:JSON.stringify(data())});out.textContent=JSON.stringify(x.quality_gate,null,2);status.textContent='Quality gate: '+x.quality_gate.status+' ('+x.quality_gate.score+'%)'}catch(e){status.textContent=e.message}}async function loadCatalog(){try{const x=await call('/api/reports/flagship/publishing/catalog');cards.innerHTML=x.catalog.profiles.map(p=>`<article class="card"><h3>${p.label}</h3><p>${p.layout}</p><p class="small">${p.products.join(' • ')}</p></article>`).join('');status.textContent='Catalogue loaded.'}catch(e){status.textContent=e.message}}async function downloadProduct(){try{status.textContent='Generating binary…';const r=await fetch(api+'/api/reports/flagship/publishing/export',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token()},body:JSON.stringify(data())});if(!r.ok)throw new Error(await r.text());const ct=r.headers.get('content-type')||'';if(ct.includes('application/json')){out.textContent=JSON.stringify(await r.json(),null,2);status.textContent='Interactive publication generated.';return}const b=await r.blob(),cd=r.headers.get('content-disposition')||'',m=cd.match(/filename="([^"]+)"/),name=m?m[1]:'voiceinsights-publication';const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),2000);status.textContent='Downloaded '+name}catch(e){status.textContent=e.message}}</script></body></html>
