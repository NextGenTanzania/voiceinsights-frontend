<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/assets/img/logo-icon.png">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — VoiceInsights Africa</title>
<link rel="stylesheet" href="/assets/css/style.css">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="shell">
  <div id="sidebar-mount"></div>
  <main class="main">
    <div id="topbar-mount"></div>
    <div class="content">
      <div id="super-admin-view-banner" style="display:none; background:linear-gradient(135deg, var(--accent), #C88A2E); color:var(--accent-ink); padding:.7rem 1.2rem; border-radius:10px; margin-bottom:1.2rem; font-size:.85rem; font-weight:600;">
        🔍 Super Admin view — viewing <span id="viewed-org-name">this organization's</span> data. <a href="/admin/organizations.html" style="color:var(--accent-ink); text-decoration:underline;">← Back to all organizations</a>
      </div>

      <div class="grid grid-4" style="margin-bottom:1.5rem;">
        <div class="card">
          <div class="card-title" data-tooltip="Surveys currently open and accepting responses on any channel.">Active Surveys</div>
          <div class="stat-value" id="stat-surveys">–</div>
        </div>
        <div class="card">
          <div class="card-title" data-tooltip="All responses received across Phone, WhatsApp, SMS, Web, and the offline Enumerator App.">Total Calls / Messages</div>
          <div class="stat-value" id="stat-responses">–</div>
        </div>
        <div class="card">
          <div class="card-title" data-tooltip="Percentage of started interviews that were completed in full.">Response Rate</div>
          <div class="stat-value" id="stat-rate">–</div>
        </div>
        <div class="card">
          <div class="card-title" data-tooltip="Share of responses where AI sentiment analysis detected a positive tone.">Positive Sentiment</div>
          <div class="stat-value" id="stat-sentiment">–</div>
        </div>
      </div>

      <div class="grid grid-2" style="margin-bottom:1.5rem; align-items:stretch;">
        <div class="card">
          <div class="section-head"><div class="card-title" style="margin:0;">Responses per Week</div></div>
          <div style="position:relative; height:220px;"><canvas id="chartResponses"></canvas></div>
        </div>
        <div class="card">
          <div class="section-head"><div class="card-title" style="margin:0;">Sentiment Breakdown</div></div>
          <div style="position:relative; height:220px;"><canvas id="chartSentiment"></canvas></div>
        </div>
      </div>

      <div class="section-head">
        <h2 style="font-size:1.1rem;">Recent Campaigns</h2>
        <a href="/app/campaigns.html" class="btn btn-ghost btn-sm">View all</a>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Campaigns</th><th>Channel</th><th>Progress</th><th>Status</th></tr></thead>
          <tbody id="recent-campaigns-tbody">
            <tr><td><div class="skeleton skeleton-text" style="width:70%;"></div></td><td><div class="skeleton skeleton-text" style="width:60%;"></div></td><td><div class="skeleton skeleton-text" style="width:80%;"></div></td><td><div class="skeleton skeleton-text" style="width:50%;"></div></td></tr>
            <tr><td><div class="skeleton skeleton-text" style="width:65%;"></div></td><td><div class="skeleton skeleton-text" style="width:55%;"></div></td><td><div class="skeleton skeleton-text" style="width:75%;"></div></td><td><div class="skeleton skeleton-text" style="width:60%;"></div></td></tr>
            <tr><td><div class="skeleton skeleton-text" style="width:72%;"></div></td><td><div class="skeleton skeleton-text" style="width:58%;"></div></td><td><div class="skeleton skeleton-text" style="width:68%;"></div></td><td><div class="skeleton skeleton-text" style="width:55%;"></div></td></tr>
          </tbody>
        </table>
      </div>

    </div>
  </main>
</div>
<script src="/assets/js/config.js"></script>
<script src="/assets/js/i18n.js"></script>
<script src="/assets/js/app.js"></script>
<script>
  if (!requireLogin()) { /* redirected to login */ }
  const storedUser = JSON.parse(localStorage.getItem('vi_user') || 'null');
  if (storedUser) { VI.user.name = storedUser.full_name; VI.user.initials = storedUser.full_name.split(' ').map(w=>w[0]).slice(0,2).join(''); }

  renderShell({ role: 'client', active: '/app/dashboard.html', eyebrow: 'Overview', title: 'Hello, ' + VI.user.name.split(' ')[0] });

  const viewedOrgId = new URLSearchParams(window.location.search).get('org_id');
  if (viewedOrgId) {
    document.getElementById('super-admin-view-banner').style.display = 'block';
    apiRequest(`/api/organizations/me?org_id=${viewedOrgId}`).then(({ organization }) => {
      document.getElementById('viewed-org-name').textContent = organization.name + "'s";
    }).catch(() => {});
  }

  const SENTIMENT_COLOR = { positive: '#6FBF8B', neutral: '#9FB3AB', negative: '#D9634A', distressed: '#E4C23A' };
  const SENTIMENT_LABEL = { positive: 'Positive', neutral: 'Neutral', negative: 'Negative', distressed: 'Distress' };

  (async () => {
    let stats;
    try {
      stats = await apiRequest(`/api/dashboard/stats${window.location.search.includes('org_id') ? window.location.search : ''}`);
      document.getElementById('stat-surveys').textContent = stats.active_surveys;
      document.getElementById('stat-responses').textContent = stats.total_responses;
      document.getElementById('stat-rate').textContent = stats.total_responses ? stats.response_rate + '%' : '—';
      document.getElementById('stat-sentiment').textContent = stats.total_responses ? stats.positive_sentiment_pct + '%' : '—';

      apiRequest('/api/campaigns').then(({ campaigns }) => {
        const tbody = document.getElementById('recent-campaigns-tbody');
        const STATUS_BADGE = { running: 'badge-success', scheduled: 'badge-warn', paused: 'badge-neutral', completed: 'badge-neutral' };
        const CHANNEL_LABEL = { whatsapp: 'WhatsApp', phone_call: 'Phone Call', web_link: 'Web Link', sms: 'SMS', app: 'Offline App' };
        if (!campaigns.length) {
          tbody.innerHTML = '<tr><td colspan="4" class="muted-note" style="padding:1.5rem;">No campaigns yet.</td></tr>';
          return;
        }
        tbody.innerHTML = campaigns.slice(0, 4).map(c => {
          const targeted = c.target_respondents || 0;
          const reached = c.reached_count || 0;
          const pct = targeted > 0 ? Math.min(100, Math.round((reached / targeted) * 100)) : (reached > 0 ? 100 : 0);
          return `<tr><td>${c.name}</td><td>${CHANNEL_LABEL[c.channel] || c.channel}</td><td style="width:160px;"><div class="progress"><span style="width:${pct}%"></span></div></td><td><span class="badge ${STATUS_BADGE[c.status] || 'badge-neutral'}">${c.status}</span></td></tr>`;
        }).join('');
      }).catch(() => {
        document.getElementById('recent-campaigns-tbody').innerHTML = '<tr><td colspan="4" class="muted-note" style="padding:1.5rem;">Could not load campaigns.</td></tr>';
      });
    } catch (e) {
      console.warn('Live stats unavailable:', e.message);
      document.getElementById('stat-surveys').textContent = '—';
      document.getElementById('stat-responses').textContent = '—';
      document.getElementById('stat-rate').textContent = '—';
      document.getElementById('stat-sentiment').textContent = '—';
      return;
    }

    // Charts are drawn separately — if Chart.js fails to load (e.g. blocked
    // by a network/firewall), the stat numbers above stay correct regardless.
    try {
      if (typeof Chart === 'undefined') throw new Error('Chart.js did not load');

      const weekLabels = stats.weekly.length ? stats.weekly.map(w => w.week) : ['This week'];
      const weekData = stats.weekly.length ? stats.weekly.map(w => w.n) : [0];
      new Chart(document.getElementById('chartResponses'), {
        type: 'line',
        data: { labels: weekLabels, datasets: [{ data: weekData, borderColor: '#E4A23A', backgroundColor: 'rgba(228,162,58,.12)', fill: true, tension: .35 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
          scales: { x: { grid: { color: 'rgba(244,239,230,.06)' }, ticks: { color: '#9FB3AB' } }, y: { beginAtZero: true, grid: { color: 'rgba(244,239,230,.06)' }, ticks: { color: '#9FB3AB', precision: 0 } } } }
      });

      const sentimentData = stats.sentiment_breakdown.length ? stats.sentiment_breakdown : [{ overall_sentiment: null, n: 1 }];
      new Chart(document.getElementById('chartSentiment'), {
        type: 'doughnut',
        data: {
          labels: sentimentData.map(s => SENTIMENT_LABEL[s.overall_sentiment] || 'No data yet'),
          datasets: [{ data: sentimentData.map(s => s.n), backgroundColor: sentimentData.map(s => SENTIMENT_COLOR[s.overall_sentiment] || '#243731'), borderWidth: 0 }],
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#9FB3AB', boxWidth: 10, padding: 14 } } } }
      });
    } catch (e) {
      console.warn('Charts unavailable:', e.message);
      document.getElementById('chartResponses').closest('.card').querySelector('.section-head').insertAdjacentHTML('afterend', '<div class="muted-note">Chart could not load (network blocked the chart library) — numbers above are still accurate.</div>');
    }
  })();
</script>
</body>
</html>
