<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Flagship Sample Report | VoiceInsights Africa</title>
  <meta name="description" content="Interactive flagship synthetic demonstration report generated by VoiceInsights Africa.">
  <link rel="stylesheet" href="/assets/css/style.css">
  <style>
    :root{--bg:#07100d;--panel:#0e1916;--line:#29483f;--ink:#eef6f2;--muted:#a6bbb2;--gold:#d4af37;--green:#69e0b2;--blue:#63a7ff;--danger:#ff8a80}*{box-sizing:border-box}html{scroll-behavior:smooth}body{background:var(--bg);color:var(--ink);margin:0}.skip-link{position:absolute;top:-80px;left:12px;background:#fff;color:#111;padding:10px 14px;z-index:99}.skip-link:focus{top:12px}.wrap{width:min(100% - 28px,1360px);margin:auto;padding:16px 0 64px}.topbar{display:flex;justify-content:space-between;gap:12px;align-items:center;position:sticky;top:0;z-index:9;padding:12px 0;background:#07100df2;backdrop-filter:blur(12px)}.topbar a{color:var(--gold)}.cover{border-radius:28px;padding:clamp(28px,6vw,76px);min-height:540px;display:flex;flex-direction:column;justify-content:flex-end;position:relative;overflow:hidden;isolation:isolate}.cover:before{content:"";position:absolute;width:470px;height:470px;border:82px solid #ffffff18;border-radius:50%;right:-130px;top:-130px;z-index:-1}.cover-logo{position:absolute;left:clamp(24px,6vw,76px);top:clamp(24px,5vw,56px);display:flex;align-items:center;gap:12px}.cover-logo img{width:52px;height:52px;object-fit:contain}.cover small{letter-spacing:.13em;font-weight:850}.cover h1{font-size:clamp(2.3rem,6vw,5.4rem);line-height:.97;margin:.2em 0;max-width:1020px;letter-spacing:-.035em}.cover p{font-size:clamp(1rem,2vw,1.35rem);max-width:820px}.actions{display:flex;gap:9px;flex-wrap:wrap;margin:18px 0}.actions a,.toc a{background:var(--gold);color:#111;padding:10px 14px;border-radius:10px;text-decoration:none;font-weight:850}.actions a:not(:first-child){background:#14241f;color:var(--ink);border:1px solid var(--line)}.notice{border:1px solid #6d5a21;background:#261f0b;padding:16px;border-radius:14px;color:#f3dda0}.panel{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:clamp(18px,3vw,30px);margin:20px 0}.panel h2{font-size:clamp(1.55rem,3vw,2.35rem);margin-top:0}.toc{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px}.toc a{white-space:nowrap;background:#13231e;color:#d8e9e1;border:1px solid var(--line);font-size:.78rem}.chapter{scroll-margin-top:78px}.kpis,.score-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px}.kpi,.score-card{background:#14241f;padding:15px;border-radius:14px;min-width:0}.kpi strong,.score-card strong{font-size:1.45rem;display:block;color:var(--gold)}.grid2{display:grid;grid-template-columns:minmax(0,1.35fr) minmax(290px,.65fr);gap:20px}.finding,.recommendation,.quote,.evidence-card{border-left:4px solid var(--gold);padding:15px 17px;margin:12px 0;background:#101f1b;border-radius:0 12px 12px 0}.recommendation{border-left-color:var(--green)}.quote{border-left-color:var(--blue)}.finding p,.recommendation p,.quote p{line-height:1.55}.charts{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,430px),1fr));gap:18px}.chart{background:#0b1512;border:1px solid var(--line);border-radius:16px;padding:16px;min-width:0}.chart h3{margin:0 0 8px}.chart .interpretation{color:var(--muted);font-size:.82rem;line-height:1.45}.bars{display:grid;gap:9px;margin:16px 0}.barrow{display:grid;grid-template-columns:minmax(90px,1fr) 3fr 52px;gap:10px;align-items:center;font-size:.82rem}.track{height:12px;background:#1b3029;border-radius:999px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,var(--gold),#55d6a5);border-radius:999px}.heat{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin:14px 0}.heat div{min-height:88px;padding:12px;border-radius:12px;display:flex;flex-direction:column;justify-content:flex-end}.matrix{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin:14px 0}.matrix div{padding:12px;border-radius:12px;background:#14241f}.table-wrap{overflow-x:auto}.table{width:100%;border-collapse:collapse;min-width:720px}.table th,.table td{padding:10px;border-bottom:1px solid var(--line);text-align:left;font-size:.84rem;vertical-align:top}.table th{color:#d8c26c}.pill{display:inline-block;padding:5px 8px;border-radius:999px;border:1px solid var(--line);margin:3px;color:var(--muted);font-size:.74rem}.framework-grid,.book-grid,.evidence-grid,.quality-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,250px),1fr));gap:12px}.framework-card,.book-card,.quality-card{background:#101f1b;border:1px solid var(--line);border-radius:14px;padding:16px}.framework-card h3,.book-card h3{margin-top:0}.status-ready{color:var(--green)}.status-blocked{color:var(--danger)}.loading,.error{padding:60px;text-align:center}.muted{color:var(--muted)}
    @media(max-width:900px){.grid2{grid-template-columns:1fr}.cover{min-height:470px}.brand-label{display:none}}
    @media(max-width:620px){.wrap{width:min(100% - 20px,1360px)}.cover{min-height:430px;border-radius:20px;padding:24px}.cover-logo{left:24px;top:24px}.actions a{flex:1 1 100%;text-align:center}.panel{border-radius:15px}.matrix{grid-template-columns:1fr}.barrow{grid-template-columns:90px 1fr 44px}}
  </style>
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <div class="wrap"><div class="topbar"><a href="/sample-reports.html">← Report Library</a><span class="brand-label">VoiceInsights Africa · Governed Flagship Demonstration</span></div><div id="app" class="loading" aria-live="polite">Loading full report…</div></div>
  <script src="/assets/js/config.js"></script>
  <script>
    const escapeHtml=value=>String(value??'').replace(/[&<>"']/g,character=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[character]));
    const asArray=value=>Array.isArray(value)?value:[];
    const safeNumber=(value,fallback=0)=>Number.isFinite(Number(value))?Number(value):fallback;
    const formatNumber=value=>Number.isFinite(Number(value))?Number(value).toLocaleString():'—';
    const clampPercent=value=>Math.max(0,Math.min(100,safeNumber(value)));
    const humanize=value=>String(value??'').replaceAll('_',' ').replace(/\b\w/g,letter=>letter.toUpperCase());
    function valueText(value){if(Array.isArray(value))return value.map(item=>typeof item==='object'?JSON.stringify(item):item).join(', ');if(value&&typeof value==='object')return Object.entries(value).map(([key,item])=>`${humanize(key)}: ${typeof item==='object'?JSON.stringify(item):item}`).join(' · ');return value??'—';}
    function table(rows,columns){const safeRows=asArray(rows);if(!safeRows.length)return '<p class="muted">No rows are available for this section.</p>';return `<div class="table-wrap"><table class="table"><thead><tr>${columns.map(column=>`<th scope="col">${escapeHtml(column[1])}</th>`).join('')}</tr></thead><tbody>${safeRows.map(row=>`<tr>${columns.map(column=>`<td>${escapeHtml(valueText(row?.[column[0]]))}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;}
    function barChart(visual){const data=asArray(visual?.data).slice(0,10);return data.length?`<div class="bars">${data.map(item=>`<div class="barrow"><span>${escapeHtml(item.label)}</span><div class="track"><div class="fill" style="width:${clampPercent(item.value)}%"></div></div><strong>${escapeHtml(item.value)}%</strong></div>`).join('')}</div>`:'<p class="muted">The chart dataset is not available.</p>';}
    function heatChart(visual){const data=asArray(visual?.data);return data.length?`<div class="heat">${data.map(item=>{const score=clampPercent(item.value);const colour=score<58?'#8f2d2d':score<70?'#8a6d1d':'#176b50';return `<div style="background:${colour}"><strong>${escapeHtml(item.label)}</strong><span>${score}% · ${escapeHtml(item.risk||'')}</span></div>`;}).join('')}</div>`:'<p class="muted">The heat-map dataset is not available.</p>';}
    function matrixChart(visual){const data=asArray(visual?.data).slice(0,8);return data.length?`<div class="matrix">${data.map(item=>`<div><strong>${escapeHtml(item.label)}</strong><p>Impact: ${escapeHtml(item.impact??item.value??'—')} · Feasibility: ${escapeHtml(item.feasibility??item.target??'—')}</p></div>`).join('')}</div>`:'<p class="muted">The matrix dataset is not available.</p>';}
    function renderChart(visual){let body=barChart(visual);if(['regional_heat_map','regional_heatmap','choropleth_map'].includes(visual?.type))body=heatChart(visual);else if(['decision_matrix','risk_matrix','priority_matrix'].includes(visual?.type))body=matrixChart(visual);return `<article class="chart"><h3>${escapeHtml(visual?.title||'Visual intelligence')}</h3>${body}<p class="interpretation"><strong>Interpretation:</strong> ${escapeHtml(visual?.interpretation||'Interpretation is unavailable.')}</p></article>`;}
    function renderReport(payload){
      const sample=payload.sample||{};const report=payload.report||{};const publication=payload.full_publication||report.full_publication||{};const platinum=payload.platinum||report.platinum||{};const cover=publication.cover||sample.cover||{};const statistics=report.statistical_intelligence||{};const executive=report.executive_book||{};const recommendations=asArray(report.recommendations);const findings=asArray(report.findings);const evidence=asArray(report.evidence);const visualizations=asArray(publication.visualizations?.length?publication.visualizations:report.visualizations);const quality=report.quality_scores||{};const sampleSize=publication.sample_size??statistics.sample_size;const responseRate=publication.response_rate_pct??statistics.response_rate;const reportKey=sample.key||report.key;
      document.title=`${sample.title||report.title||'Flagship Report'} | VoiceInsights Africa`;
      const exportLinks=[['pdf','Premium PDF'],['docx','Editable Word'],['pptx','Native PowerPoint'],['xlsx','Statistical Excel']].map(([extension,label])=>`<a href="${escapeHtml(API_BASE_URL)}/api/public/flagship-sample-library/${encodeURIComponent(reportKey)}/export/${extension}">Download ${label}</a>`).join('');
      document.querySelector('#app').className='';document.querySelector('#app').innerHTML=`
        <section class="cover" style="background:linear-gradient(135deg,${escapeHtml(cover.primary||'#082B55')},${escapeHtml(cover.accent||'#1669A8')})"><div class="cover-logo"><img src="/assets/img/logo-transparent.png" alt="VoiceInsights Africa logo"><strong>VOICEINSIGHTS AFRICA</strong></div><small>TIER ${escapeHtml(sample.tier)} · ${escapeHtml(sample.category)} · SYNTHETIC DEMONSTRATION PUBLICATION</small><h1>${escapeHtml(sample.title||report.title)}</h1><p>${escapeHtml(sample.promise||report.subtitle||report.executive_summary)}</p><div>${escapeHtml(sample.country||report.country)} · ${escapeHtml(sample.sector||report.sector)} · ${formatNumber(sampleSize)} synthetic responses</div></section>
        <div class="actions">${exportLinks}</div><div class="notice"><strong>Responsible-use notice:</strong> ${escapeHtml(payload.integrity_notice||report.branding?.synthetic_notice)}</div>
        <section class="panel"><small>VOICEINSIGHTS WORLD-CLASS PLATINUM REPORT ENGINE™</small><h2>Executive Intelligence Book</h2><p>${escapeHtml(executive.executive_brief||report.executive_summary)}</p><div class="book-grid">${['Executive Book','Decision Book','Evidence Intelligence Book','Statistical Intelligence Book'].map((title,index)=>`<div class="book-card"><h3>${title}</h3><p>${['Risks, opportunities, budget implications and immediate actions.','Evidence-linked decisions with owner, timeline, cost and success criteria.','Finding-to-source lineage, quotes, question, indicator and approvals.','Sampling, weighting, uncertainty, reliability and reproducibility.'][index]}</p></div>`).join('')}</div></section>
        <nav class="panel toc" aria-label="Report sections"><a href="#executive">Executive</a><a href="#findings">Findings</a><a href="#evidence">Evidence Explorer</a><a href="#statistics">Statistics</a><a href="#decisions">Decisions</a><a href="#standards">Standards</a><a href="#quality">Quality Gate</a></nav>
        <main id="main-content">
          <section class="panel chapter" id="executive"><h2>Decision Snapshot</h2><div class="kpis"><div class="kpi"><strong>${formatNumber(sampleSize)}</strong><small>Synthetic responses</small></div><div class="kpi"><strong>${formatNumber(responseRate)}%</strong><small>Response rate</small></div><div class="kpi"><strong>${findings.length}</strong><small>Evidence-linked findings</small></div><div class="kpi"><strong>${recommendations.length}</strong><small>Priority decisions</small></div><div class="kpi"><strong>${formatNumber(quality.overall_publication_readiness)}/100</strong><small>Publication readiness</small></div><div class="kpi"><strong>${visualizations.length}</strong><small>Interpreted visuals</small></div></div><h3>Critical risks</h3>${asArray(executive.critical_risks).map(risk=>`<div class="finding"><strong>${escapeHtml(risk.risk)}</strong><p>Likelihood: ${escapeHtml(risk.likelihood)} · Impact: ${escapeHtml(risk.impact)}</p></div>`).join('')}<h3>Cost of inaction</h3><p>${escapeHtml(executive.cost_of_inaction)}</p></section>
          <section class="panel"><h2>Executive Dashboard &amp; Visual Intelligence</h2><div class="charts">${visualizations.slice(0,8).map(renderChart).join('')}</div></section>
          <div class="grid2"><section class="panel chapter" id="findings"><h2>Critical Findings</h2>${findings.map(finding=>`<article class="finding"><strong>${escapeHtml(finding.id)} · ${escapeHtml(finding.title)}</strong><p>${escapeHtml(finding.text)}</p><small>Evidence: ${escapeHtml(asArray(finding.evidence_ids).join(', '))} · Confidence ${formatNumber(finding.confidence_score)}% · ${escapeHtml(finding.verification_status)}</small></article>`).join('')}</section><aside><section class="panel"><h2>Publication Profile</h2>${asArray(sample.standards).map(standard=>`<span class="pill">${escapeHtml(standard)}</span>`).join('')}<p><strong>Profile:</strong> ${escapeHtml(report.publication_profile)}</p><p><strong>Version:</strong> ${escapeHtml(report.branding?.publication_version)}</p><p><strong>Publication ID:</strong> ${escapeHtml(report.branding?.publication_id)}</p></section><section class="panel"><h2>Methodology at a glance</h2>${Object.entries(report.methodology||{}).slice(0,8).map(([key,value])=>`<p><strong>${escapeHtml(humanize(key))}</strong><br>${escapeHtml(valueText(value))}</p>`).join('')}</section></aside></div>
          <section class="panel chapter" id="evidence"><h2>Evidence Explorer &amp; Lineage</h2><p>Every finding is connected to a governed synthetic source chain. Selectable evidence fields below show the question, quote, indicator, masked location, media references and review approval.</p>${table(evidence,[['evidence_id','Evidence ID'],['survey_question','Survey question'],['respondent_group','Respondent group'],['quote','Respondent quote'],['indicator','Indicator'],['gps','GPS'],['audio_reference','Audio'],['photo_reference','Photo'],['verification_status','Approval'],['confidence_score','Confidence']])}</section>
          <section class="panel chapter" id="statistics"><h2>Statistical Intelligence Book</h2>${table([statistics],[['sampling_design','Sampling design'],['sampling_frame','Sampling frame'],['sample_size','Sample size'],['weighting','Weighting'],['confidence_intervals','Confidence intervals'],['response_rate','Response rate'],['design_effect','Design effect'],['regression','Regression'],['trend_analysis','Trend analysis']])}<div class="framework-grid">${['reliability','validity','missing_data_analysis','outlier_detection','data_quality_assessment','reproducibility_notes'].map(key=>`<div class="framework-card"><h3>${escapeHtml(humanize(key))}</h3><p>${escapeHtml(valueText(statistics[key]))}</p></div>`).join('')}</div><h3>Methodological limitations</h3><ul>${asArray(statistics.methodological_limitations).map(item=>`<li>${escapeHtml(item)}</li>`).join('')}</ul></section>
          <section class="panel chapter" id="decisions"><h2>Decision Intelligence Book</h2>${recommendations.map(decision=>`<article class="recommendation"><strong>${escapeHtml(decision.decision_id||decision.id)} · ${escapeHtml(decision.strategic_priority||decision.priority)}</strong><h3>${escapeHtml(decision.recommendation)}</h3><p><strong>Why:</strong> ${escapeHtml(decision.why_this_recommendation_exists)}</p><p><strong>Expected benefit:</strong> ${escapeHtml(decision.expected_benefit)} <strong>Risk:</strong> ${escapeHtml(decision.expected_risk)}</p><small>Owner: ${escapeHtml(decision.owner)} · Support: ${escapeHtml(decision.supporting_organization)} · Timeline: ${escapeHtml(decision.timeline)} · Budget: ${escapeHtml(decision.budget_requirement)} · Indicator: ${escapeHtml(decision.monitoring_indicator)} · Success: ${escapeHtml(decision.success_criteria)}</small></article>`).join('')}</section>
          <section class="panel chapter" id="standards"><h2>International Standards &amp; Institutional Alignment</h2><div class="framework-grid">${asArray(publication.standards_compliance_matrix).map(item=>`<div class="framework-card"><h3>${escapeHtml(item.standard)}</h3><strong>${escapeHtml(item.status)}</strong><p>${escapeHtml(item.evidence||item.limitation)}</p></div>`).join('')}</div><h3>OECD-DAC (where relevant)</h3>${table(publication.oecd_dac,[['criterion','Criterion'],['assessment','Assessment'],['score','Score'],['management_implication','Management implication']])}<h3>Results-Based Management &amp; Theory of Change</h3><p><strong>Impact:</strong> ${escapeHtml(valueText(publication.rbm_results_framework?.impact))}</p><p><strong>Outcomes:</strong> ${escapeHtml(valueText(publication.rbm_results_framework?.outcomes))}</p></section>
          <section class="panel"><h2>Regional, Inclusion &amp; Indicator Intelligence</h2><h3>Regional performance</h3>${table(publication.regional,[['name','Region'],['responses','Responses'],['primary_score','Performance'],['satisfaction','Satisfaction'],['women_pct','Women'],['youth_pct','Youth'],['risk','Risk']])}<h3>Indicator register</h3>${table(publication.indicators,[['id','Indicator ID'],['label','Indicator'],['value','Value'],['target','Target'],['status','Status'],['trend','Trend']])}<h3>Respondent voice</h3>${asArray(publication.quotes).map(quote=>`<blockquote class="quote"><p>${escapeHtml(quote.quote)}</p><small>${escapeHtml(quote.region)} · ${escapeHtml(quote.respondent_group)} · ${escapeHtml(quote.theme)} · Evidence ${escapeHtml(quote.evidence_id)} · ${formatNumber(quote.confidence)}% confidence</small></blockquote>`).join('')}</section>
          <section class="panel chapter" id="quality"><h2>Publication Quality Gate</h2><div class="quality-grid">${[['Publication quality',quality.publication_quality],['Evidence quality',quality.evidence_quality],['Statistical quality',quality.statistical_quality],['Visualization quality',quality.visualization_quality],['Storytelling quality',quality.storytelling_quality],['Accessibility',quality.accessibility],['Decision support',quality.decision_support],['Overall readiness',quality.overall_publication_readiness]].map(([label,score])=>`<div class="quality-card"><strong>${escapeHtml(label)}</strong><p>${formatNumber(score)}/100</p></div>`).join('')}</div><p>Rule-based gate: <strong class="${quality.gate==='PUBLICATION_READY'?'status-ready':'status-blocked'}">${escapeHtml(quality.gate||'NOT ASSESSED')}</strong></p><p class="muted">Scores are calculated from report completeness, evidence linkage, statistical documentation, interpreted visualisation data, accessibility metadata, decision fields and export readiness. They are not manually assigned marketing scores.</p></section>
          <section class="panel"><h2>Technical Annex &amp; Data Dictionary</h2>${table(report.data_dictionary,[['variable','Variable'],['label','Label'],['type','Type'],['allowed_values','Allowed values'],['missing_code','Missing code']])}<h3>Limitations and responsible use</h3><ul>${asArray(report.limitations).map(item=>`<li>${escapeHtml(item)}</li>`).join('')}</ul></section>
        </main>`;
    }
    async function loadReport(){const reportKey=new URLSearchParams(location.search).get('key');if(!reportKey){document.querySelector('#app').className='error panel';document.querySelector('#app').textContent='No report key was supplied.';return;}try{const response=await fetch(`${API_BASE_URL}/api/public/flagship-sample-library/${encodeURIComponent(reportKey)}`);if(!response.ok)throw new Error(response.status===404?'Report not found.':`Report service returned HTTP ${response.status}.`);renderReport(await response.json());}catch(error){document.querySelector('#app').className='error panel';document.querySelector('#app').innerHTML=`<h1>Unable to open the full report</h1><p>${escapeHtml(error.message)}</p><button type="button" onclick="loadReport()">Retry</button>`;}}
    loadReport();
  </script>
</body>
</html>
