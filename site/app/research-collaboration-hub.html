<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Research Collaboration Hub — VoiceInsights Africa</title><style>:root{--bg:#07110f;--card:#101c19;--line:#28443c;--text:#effaf6;--muted:#9db7ad;--gold:#d9b95b;--green:#38c793}*{box-sizing:border-box}body{margin:0;background:linear-gradient(145deg,#06100e,#10211c);color:var(--text);font-family:Inter,system-ui,sans-serif}.shell{max-width:1280px;margin:auto;padding:28px}.hero,.card{border:1px solid var(--line);background:rgba(16,28,25,.94);border-radius:20px;padding:22px;box-shadow:0 20px 55px rgba(0,0,0,.22)}.hero{margin-bottom:18px;background:radial-gradient(circle at top right,rgba(217,185,91,.2),transparent 35%),var(--card)}h1{font-size:clamp(1.9rem,5vw,3.5rem);margin:.2em 0}h2{margin-top:0}.eyebrow{color:var(--gold);font-weight:800;text-transform:uppercase;letter-spacing:.1em}.muted{color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}.wide{grid-column:span 2}.full{grid-column:1/-1}.kpi{font-size:2rem;font-weight:900}.badge,button,a.btn{display:inline-flex;border:1px solid var(--line);border-radius:999px;padding:9px 13px;color:var(--text);background:#142720;text-decoration:none;margin:4px;cursor:pointer}.gold{color:#221c08;background:var(--gold);border-color:var(--gold);font-weight:800}.ok{color:var(--green)}.bar{height:9px;background:#21342f;border-radius:99px;overflow:hidden}.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--green))}input,select,textarea{width:100%;padding:12px;border-radius:10px;border:1px solid var(--line);background:#091512;color:var(--text);margin:5px 0 12px}table{width:100%;border-collapse:collapse}th,td{padding:10px;border-bottom:1px solid var(--line);text-align:left}@media(max-width:820px){.grid{grid-template-columns:1fr}.wide{grid-column:auto}.shell{padding:14px}table{display:block;overflow:auto}}</style></head><body>
<a class="skip-link" href="#main-content">Skip to main content</a><main id="main-content" class="shell"><section class="hero"><div class="eyebrow">Trusted partner network</div><h1>Research Collaboration Hub</h1><p class="muted">Connect governments, NGOs, universities and verified research partners without sharing confidential respondent data.</p></section><div class="grid"><section class="card"><h2>Post opportunity</h2><form id="f"><input aria-label="Opportunity title" name="title" placeholder="Opportunity title" required><input aria-label="Country" name="country" placeholder="Country" required><input aria-label="Region" name="region" placeholder="Region"><input aria-label="Sector" name="sector" placeholder="Sector" required><select name="opportunity_type"><option>research_partner</option><option>enumerator_partner</option><option>technical_partner</option><option>implementation_partner</option></select><textarea name="description" placeholder="Description"></textarea><button class="gold">Publish</button><p id="msg"></p></form></section><section class="card wide"><h2>Open opportunities</h2><div id="list">Loading…</div></section></div></main><script src="/assets/js/config.js"></script><script src="/assets/js/app.js"></script><script>const api=async(path,opt={})=>{if(typeof apiRequest==='function')return apiRequest(path,opt);const token=localStorage.getItem('vi_token');const r=await fetch((window.VI_API_BASE||'https://voiceinsights-api.kitentyatsnp.workers.dev')+path,{...opt,headers:{'Content-Type':'application/json',...(token?{Authorization:'Bearer '+token}:{}),...(opt.headers||{})}});const d=await r.json().catch(()=>({}));if(!r.ok)throw Error(d.error||'Request failed');return d};const esc=s=>String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));</script><script>async function load(){const d=await api('/api/intelligence-network/collaboration');document.getElementById('list').innerHTML=(d.opportunities||[]).map(o=>`<article style="border-bottom:1px solid var(--line);padding:12px"><b>${esc(o.title)}</b><p class="muted">${esc(o.country)} · ${esc(o.sector)} · ${esc(o.opportunity_type)}</p><p>${esc(o.description||'')}</p></article>`).join('')||'<p class="muted">No open opportunities yet.</p>'}document.getElementById('f').onsubmit=async e=>{e.preventDefault();const b=Object.fromEntries(new FormData(e.target));try{await api('/api/intelligence-network/collaboration',{method:'POST',body:JSON.stringify(b)});document.getElementById('msg').textContent='Opportunity published.';e.target.reset();load()}catch(x){document.getElementById('msg').textContent=x.message}};load();</script></body></html>
